<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D梦幻城堡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 引入高雅的中英文字体组合 -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05020a;
            font-family: 'Noto Serif SC', 'Cinzel', serif;
            color: #e2e8f0;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 磨砂全息控制面板 */
        .hud-overlay {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: auto;
            background: rgba(13, 5, 32, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px rgba(255, 105, 180, 0.3) solid;
            border-radius: 30px;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 15px rgba(255, 105, 180, 0.05);
            transition: all 0.3s ease;
        }

        .hud-overlay:hover {
            border-color: rgba(255, 105, 180, 0.6);
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.25);
        }

        .gift-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .gift-icon {
            font-size: 24px;
            animation: bounce 2s infinite alternate;
        }

        .gift-text {
            display: flex;
            flex-direction: column;
        }

        .gift-title {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 14px;
            color: #ffb6c1;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.5);
        }

        .gift-status {
            font-size: 10px;
            color: rgba(226, 232, 240, 0.6);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* 重播控制 */
        .control-btn {
            background: rgba(255, 105, 180, 0.15);
            border: 1px rgba(255, 105, 180, 0.45) solid;
            color: #ffb6c1;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
            letter-spacing: 1.5px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .control-btn:hover {
            background: rgba(255, 105, 180, 0.35);
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
            transform: translateY(-1px);
        }

        /* 引导遮罩 */
        .intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 4, 25, 0.97);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .intro-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .castle-logo {
            font-size: 72px;
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.6));
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }

        .intro-title {
            font-family: 'Cinzel', serif;
            font-size: 26px;
            font-weight: 900;
            color: #ffb6c1;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
            margin-bottom: 8px;
            text-align: center;
        }

        .intro-subtitle {
            font-size: 12px;
            color: rgba(226, 232, 240, 0.55);
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 90%;
            line-height: 1.5;
        }

        .start-btn {
            background: linear-gradient(135deg, #ffb6c1, #ff69b4);
            border: none;
            color: #0d0520;
            padding: 14px 44px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 3px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 105, 180, 0.6);
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }
    </style>

    <!-- 导入 Three.js 及 OrbitControls 轨道控制器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <!-- 引导界面 -->
    <div class="intro-screen" id="intro-screen">
        <div class="castle-logo">🏰</div>
        <h1 class="intro-title">ROYAL EPIC CASTLE</h1>
        <p class="intro-subtitle">1:1 精密还原哥特悬廊城堡 · 全屏自适应物理烟花</p>
        <button class="start-btn" id="start-btn">开启奢华 3D 星空</button>
    </div>

    <!-- 顶端悬浮 HUD -->
    <div class="hud-overlay">
        <div class="gift-info">
            <span class="gift-icon">🏰</span>
            <div class="gift-text">
                <span class="gift-title" id="hud-title">等待开启...</span>
                <span class="gift-status" id="hud-timer">0.0s / 12.0s</span>
            </div>
        </div>
        <button class="control-btn" id="replay-btn">重播特效</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // =========================================================================
        // 《3D 皇家梦幻城堡与物理烟花》引擎与渲染管线
        // =========================================================================

        const PALETTE = {
            pink: 0xffb7c5,        // 樱花粉色
            hotPink: 0xff6b9b,     // 深玫瑰粉
            white: 0xfffdf6,       // 象牙白/珍珠白
            gold: 0xffd700,        // 皇家黄金
            darkGold: 0xc5a000,    // 暗金
            yellow: 0xfff0b8,      // 柔和窗黄
            bgTop: 0x060312,       // 遥远星空顶
            bgBottom: 0x140722,    // 地平线深紫
            fireworks: [0xff3f6c, 0x1e73ff, 0xae46ff, 0xff5bb0, 0xffd700, 0x00f3db]
        };

        class Gift3DEngine {
            constructor() {
                this.container = document.getElementById('canvas-container');
                
                // 动效核心时间轴
                this.timeline = 0;
                this.lastTime = performance.now();
                this.isPlaying = false;

                // 3D 场景、相机、渲染器初始化
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x060312, 0.015);

                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.adjustCameraForViewport();

                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.setClearColor(PALETTE.bgTop, 1);
                this.container.appendChild(this.renderer.domElement);

                // 轨道群组
                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxPolarAngle = Math.PI / 2 - 0.02; // 禁止穿入地表
                this.controls.minDistance = 15;
                this.controls.maxDistance = 150;
                // 锁定视觉中心为 (0,0,0) 实现绝对居中
                this.controls.target.set(0, 0, 0);

                // 实体群组
                this.castleGroup = new THREE.Group();
                this.scene.add(this.castleGroup);

                this.magicCircle = null;
                this.windowLights = [];
                this.flags = []; 
                this.fireworks = []; 

                this.convergeParticles = null;
                this.fallingStars = null;

                this.setupLights();
                this.buildCastle();
                this.buildMagicCircle();
                this.buildFallingStars();
                this.bindEvents();

                // 启动动画主循环
                window.onload = () => {
                    this.animate();
                };
            }

            // 根据屏幕比例动态自适应相机高度和深度
            adjustCameraForViewport() {
                const aspect = window.innerWidth / window.innerHeight;
                if (aspect < 1.0) {
                    // 竖屏 (手机端)，将相机退回更远，并略微调高，确保城堡绝对完美居中
                    this.camera.position.set(0, 20, 52);
                } else {
                    // 横屏 (电脑端)
                    this.camera.position.set(0, 16, 42);
                }
            }

            setupLights() {
                // 大气环境底光
                const ambientLight = new THREE.AmbientLight(0x23143d, 1.5);
                this.scene.add(ambientLight);

                // 温暖耀眼的粉金斜射主光源
                this.dirLight = new THREE.DirectionalLight(0xffb7c5, 2.0);
                this.dirLight.position.set(20, 30, 25);
                this.dirLight.castShadow = true;
                this.dirLight.shadow.mapSize.width = 2048;
                this.dirLight.shadow.mapSize.height = 2048;
                this.scene.add(this.dirLight);

                // 侧向辅蓝光以打磨大理石暗部边缘
                this.fillLight = new THREE.DirectionalLight(0x356aff, 0.9);
                this.fillLight.position.set(-20, 15, -15);
                this.scene.add(this.fillLight);

                // 正中心聚光灯，高亮城堡核心
                this.spotLight = new THREE.SpotLight(0xffffff, 3.0);
                this.spotLight.position.set(0, 50, 0);
                this.spotLight.angle = Math.PI / 3;
                this.spotLight.penumbra = 0.9;
                this.scene.add(this.spotLight);
            }

            // --- 精密3D城堡构建 (Gothic皇家粉白拼接风格，一比一复刻参考图) ---
            buildCastle() {
                // 1. 材质定义 (珍珠大理石白 / 樱花磨砂粉 / 皇家电镀金)
                const wallMaterial = new THREE.MeshStandardMaterial({
                    color: PALETTE.white,
                    roughness: 0.35,
                    metalness: 0.08
                });

                const roofMaterial = new THREE.MeshStandardMaterial({
                    color: PALETTE.pink,
                    roughness: 0.28,
                    metalness: 0.12
                });

                const accentMaterial = new THREE.MeshStandardMaterial({
                    color: PALETTE.hotPink,
                    roughness: 0.35,
                    metalness: 0.08
                });

                const goldMaterial = new THREE.MeshStandardMaterial({
                    color: PALETTE.gold,
                    roughness: 0.15,
                    metalness: 0.9
                });

                const windowOffMaterial = new THREE.MeshBasicMaterial({ color: 0x140a20 });

                // 2. 辅助建造器：带有精致雕边的高挺拱形窗户
                const createGothicWindow = (x, y, z, rotY, parent) => {
                    const winGroup = new THREE.Group();
                    winGroup.position.set(x, y, z);
                    winGroup.rotation.y = rotY;

                    // 拱门形发光片背板
                    const backGeo = new THREE.BoxGeometry(0.32, 0.7, 0.04);
                    const back = new THREE.Mesh(backGeo, windowOffMaterial.clone());
                    winGroup.add(back);
                    this.windowLights.push(back); // 登记以便稍后点亮

                    // 黄金外框架
                    const frameGeo = new THREE.BoxGeometry(0.4, 0.78, 0.05);
                    const frame = new THREE.Mesh(frameGeo, goldMaterial);
                    frame.position.z = -0.01;
                    winGroup.add(frame);

                    parent.add(winGroup);
                };

                // 3. 辅助建造器：随风微动黄金小旌旗
                const createFlag = (x, y, z, parent) => {
                    const poleGeo = new THREE.CylinderGeometry(0.04, 0.04, 1.8, 8);
                    const pole = new THREE.Mesh(poleGeo, goldMaterial);
                    pole.position.set(x, y + 0.9, z);
                    parent.add(pole);

                    // 锥体模拟旗面
                    const flagGeo = new THREE.ConeGeometry(0.45, 1.0, 4);
                    const flag = new THREE.Mesh(flagGeo, accentMaterial);
                    flag.rotation.z = Math.PI / 2;
                    flag.position.set(x + 0.42, y + 1.4, z);
                    parent.add(flag);
                    this.flags.push(flag); 
                };

                // 4. 辅助建造器：高空悬挂跨接拱桥 (复刻参考图)
                const createBridge = (xStart, zStart, xEnd, zEnd, height, parent) => {
                    const bridgeGroup = new THREE.Group();
                    bridgeGroup.position.set((xStart + xEnd) / 2, height, (zStart + zEnd) / 2);
                    
                    const dx = xEnd - xStart;
                    const dz = zEnd - zStart;
                    const len = Math.sqrt(dx * dx + dz * dz);
                    const angle = Math.atan2(dz, dx);
                    bridgeGroup.rotation.y = -angle;

                    // 桥身主体
                    const spanGeo = new THREE.BoxGeometry(len, 0.4, 0.7);
                    const span = new THREE.Mesh(spanGeo, accentMaterial);
                    bridgeGroup.add(span);

                    // 桥身底部金色支撑拱拱圈
                    const archGeo = new THREE.CylinderGeometry(len/2, len/2, 0.6, 16, 1, false, 0, Math.PI);
                    const arch = new THREE.Mesh(archGeo, goldMaterial);
                    arch.rotation.x = Math.PI / 2;
                    arch.position.y = -0.3;
                    bridgeGroup.add(arch);

                    // 桥上两侧金色围网安全扶手
                    const railGeo1 = new THREE.BoxGeometry(len, 0.35, 0.04);
                    const rail1 = new THREE.Mesh(railGeo1, goldMaterial);
                    rail1.position.z = 0.33;
                    rail1.position.y = 0.3;
                    const rail2 = new THREE.Mesh(railGeo1, goldMaterial);
                    rail2.position.z = -0.33;
                    rail2.position.y = 0.3;
                    bridgeGroup.add(rail1, rail2);

                    parent.add(bridgeGroup);
                };

                // ==========================================
                // 🏰【3D 城堡物理空间整体向下平移 `-7.5`，实现绝对视觉居中】🏰
                // ==========================================
                const rootPivot = new THREE.Group();
                rootPivot.position.y = -7.5; 
                this.castleGroup.add(rootPivot);

                // === A. 皇家大型八角双层阶梯底座 ===
                const baseGroup = new THREE.Group();
                const baseGeo1 = new THREE.CylinderGeometry(9.0, 9.6, 1.4, 8);
                const b1 = new THREE.Mesh(baseGeo1, wallMaterial);
                b1.position.y = 0.7;
                baseGroup.add(b1);

                const baseGeo2 = new THREE.CylinderGeometry(7.6, 8.2, 0.9, 8);
                const b2 = new THREE.Mesh(baseGeo2, accentMaterial);
                b2.position.y = 1.85;
                baseGroup.add(b2);
                rootPivot.add(baseGroup);

                // === B. 主殿 Core Keep ===
                const keepGroup = new THREE.Group();
                keepGroup.position.y = 2.3;

                const mainHallGeo = new THREE.BoxGeometry(7.4, 5.5, 7.4);
                const mainHall = new THREE.Mesh(mainHallGeo, wallMaterial);
                mainHall.position.y = 2.75;
                keepGroup.add(mainHall);

                // 裙墙城楼精美刻线与金边
                const trimGeo = new THREE.BoxGeometry(7.6, 0.3, 7.6);
                const trim = new THREE.Mesh(trimGeo, goldMaterial);
                trim.position.y = 5.5;
                keepGroup.add(trim);

                // 齿轮状悬挑城垛
                for (let i = -3.4; i <= 3.4; i += 1.7) {
                    const battlementGeo = new THREE.BoxGeometry(0.85, 0.65, 0.35);
                    const bFront = new THREE.Mesh(battlementGeo, accentMaterial);
                    bFront.position.set(i, 5.8, 3.65);
                    const bBack = new THREE.Mesh(battlementGeo, accentMaterial);
                    bBack.position.set(i, 5.8, -3.65);
                    keepGroup.add(bFront, bBack);
                }

                // 殿前高挺拱形对称窗户
                createGothicWindow(-1.9, 2.8, 3.72, 0, keepGroup);
                createGothicWindow(1.9, 2.8, 3.72, 0, keepGroup);

                // === C. 华丽飞扶壁前卫双塔 (Front Spires) ===
                const buildFrontTower = (xSide) => {
                    const tower = new THREE.Group();
                    tower.position.set(xSide * 4.8, 2.3, 3.2);

                    // 多段渐变棱角塔身
                    const towerBodyGeo = new THREE.CylinderGeometry(1.05, 1.25, 8.0, 12);
                    const towerBody = new THREE.Mesh(towerBodyGeo, wallMaterial);
                    towerBody.position.y = 4.0;
                    tower.add(towerBody);

                    // 塔腰金色带刻字圆环
                    const ringGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.25, 12);
                    const ring = new THREE.Mesh(ringGeo, goldMaterial);
                    ring.position.y = 4.8;
                    tower.add(ring);

                    // 高空城楼围网观景露台
                    const terraceGeo = new THREE.CylinderGeometry(1.35, 1.35, 0.45, 12);
                    const terrace = new THREE.Mesh(terraceGeo, accentMaterial);
                    terrace.position.y = 8.2;
                    tower.add(terrace);

                    // 黄金尖围栏环
                    const fenceGeo = new THREE.CylinderGeometry(1.4, 1.4, 0.25, 12, 1, true);
                    const fence = new THREE.Mesh(fenceGeo, goldMaterial);
                    fence.position.y = 8.5;
                    tower.add(fence);

                    // 尖耸锥形瓦片塔盖
                    const spireGeo = new THREE.ConeGeometry(1.42, 4.6, 12);
                    const spire = new THREE.Mesh(spireGeo, roofMaterial);
                    spire.position.y = 10.6;
                    tower.add(spire);

                    createFlag(0, 12.9, 0, tower);

                    // 丰富窗棂细节
                    createGothicWindow(0, 5.8, 1.08, 0, tower);
                    createGothicWindow(xSide * 1.08, 3.6, 0, xSide * Math.PI/2, tower);

                    rootPivot.add(tower);
                };
                buildFrontTower(-1);
                buildFrontTower(1);

                // === D. 殿后至高史诗塔楼群 (含高空跨接连接拱桥 + 倾斜飞扶壁) ===
                const buildRearTower = (xSide) => {
                    const tower = new THREE.Group();
                    tower.position.set(xSide * 4.6, 2.3, -3.4);

                    // 极高一阶底座塔柱 (白色)
                    const baseBodyGeo = new THREE.CylinderGeometry(1.25, 1.35, 11.0, 12);
                    const baseBody = new THREE.Mesh(baseBodyGeo, wallMaterial);
                    baseBody.position.y = 5.5;
                    tower.add(baseBody);

                    // 玫瑰粉色多面体腰台露台
                    const midTerraceGeo = new THREE.CylinderGeometry(1.45, 1.45, 0.55, 12);
                    const midTerrace = new THREE.Mesh(midTerraceGeo, accentMaterial);
                    midTerrace.position.y = 11.25;
                    tower.add(midTerrace);

                    // 悬挑金色安全立柱
                    const midFenceGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.3, 12, 1, true);
                    const midFence = new THREE.Mesh(midFenceGeo, goldMaterial);
                    midFence.position.y = 11.55;
                    tower.add(midFence);

                    // 二阶收缩纤细塔柱
                    const upperBodyGeo = new THREE.CylinderGeometry(0.9, 0.9, 5.0, 12);
                    const upperBody = new THREE.Mesh(upperBodyGeo, wallMaterial);
                    upperBody.position.y = 13.8;
                    tower.add(upperBody);

                    // 巍峨主尖顶 conical top
                    const spireGeo = new THREE.ConeGeometry(1.0, 4.2, 12);
                    const spire = new THREE.Mesh(spireGeo, roofMaterial);
                    spire.position.y = 18.2;
                    tower.add(spire);

                    createFlag(0, 20.3, 0, tower);

                    // 1. 【倾斜哥特式飞扶壁支架 (连接后高塔与主殿，完美复刻原图)】
                    const buttressGeo = new THREE.BoxGeometry(1.9, 0.3, 0.5);
                    const buttress = new THREE.Mesh(buttressGeo, accentMaterial);
                    // 空间架桥倾斜定位
                    buttress.position.set(-xSide * 1.5, 9.2, 1.35);
                    buttress.rotation.z = xSide * 0.42; 
                    tower.add(buttress);

                    // 2. 【高空跨接连接大拱桥 (一比一连廊设计)】
                    // 连通大殿顶部 (0, 7.0, 0) 与高卫塔 (xSide * 4.6, 2.3+11, -3.4) 之间的空中交通
                    createBridge(xSide * 4.6, -3.4, 0, 0, 10.5, rootPivot);

                    // 错落窗格
                    createGothicWindow(0, 8.0, 1.28, 0, tower);
                    createGothicWindow(0, 14.5, 0.92, 0, tower);
                    createGothicWindow(-xSide * 1.28, 4.8, 0, -xSide * Math.PI/2, tower);

                    rootPivot.add(tower);
                };
                buildRearTower(-1);
                buildRearTower(1);

                // === E. 中央至尊双叠圣堂主钟楼 (Grand Central Keep Spires) ===
                const grandTower = new THREE.Group();
                grandTower.position.set(0, 7.8, 0); // 耸立于主殿天台

                // 1. 八角形镂空回廊主殿堂
                const coreBodyGeo = new THREE.CylinderGeometry(1.85, 1.95, 9.0, 8);
                const coreBody = new THREE.Mesh(coreBodyGeo, wallMaterial);
                coreBody.position.y = 4.5;
                grandTower.add(coreBody);

                // 环绕八角殿堂的 8 根皇家黄金雕花承重立柱 (增强图样细节)
                for (let i = 0; i < 8; i++) {
                    const angle = (i * Math.PI) / 4;
                    const colGeo = new THREE.CylinderGeometry(0.13, 0.13, 9.0, 8);
                    const col = new THREE.Mesh(colGeo, goldMaterial);
                    col.position.set(Math.cos(angle) * 1.92, 4.5, Math.sin(angle) * 1.92);
                    grandTower.add(col);
                }

                // 2. 至上露台与钟楼过渡
                const clockTerraceGeo = new THREE.CylinderGeometry(2.15, 2.15, 0.65, 12);
                const clockTerrace = new THREE.Mesh(clockTerraceGeo, accentMaterial);
                clockTerrace.position.y = 9.3;
                grandTower.add(clockTerrace);

                const clockFenceGeo = new THREE.CylinderGeometry(2.2, 2.2, 0.3, 12, 1, true);
                const clockFence = new THREE.Mesh(clockFenceGeo, goldMaterial);
                clockFence.position.y = 9.6;
                grandTower.add(clockFence);

                // 二级收缩尖耸主殿
                const topSpireBodyGeo = new THREE.CylinderGeometry(1.25, 1.25, 4.8, 8);
                const topSpireBody = new THREE.Mesh(topSpireBodyGeo, wallMaterial);
                topSpireBody.position.y = 11.8;
                grandTower.add(topSpireBody);

                // 至尊主塔粉瓦尖尖
                const masterRoofGeo = new THREE.ConeGeometry(1.4, 6.6, 12);
                const masterRoof = new THREE.Mesh(masterRoofGeo, roofMaterial);
                masterRoof.position.y = 17.3;
                grandTower.add(masterRoof);

                createFlag(0, 20.6, 0, grandTower);

                // 双重高密度窗棂点缀
                createGothicWindow(-0.65, 4.8, 1.88, 0, grandTower);
                createGothicWindow(0.65, 4.8, 1.88, 0, grandTower);
                createGothicWindow(0, 12.0, 1.28, 0, grandTower);

                keepGroup.add(grandTower);

                // === F. 前置皇家樱粉凯旋拱门 ===
                const frontGate = new THREE.Group();
                frontGate.position.set(0, 0, 3.75);

                const gateFrameGeo = new THREE.BoxGeometry(3.3, 3.3, 0.65);
                const gateFrame = new THREE.Mesh(gateFrameGeo, accentMaterial);
                gateFrame.position.y = 1.65;
                frontGate.add(gateFrame);

                // 金色包边拱圈
                const gateArchGeo = new THREE.CylinderGeometry(1.15, 1.15, 0.85, 16, 1, false, 0, Math.PI);
                const gateArch = new THREE.Mesh(gateArchGeo, goldMaterial);
                gateArch.rotation.x = Math.PI / 2;
                gateArch.position.set(0, 2.45, 0);
                frontGate.add(gateArch);

                // 奢华暗紫朱红大殿双掩门
                const doorGeo = new THREE.BoxGeometry(0.98, 2.35, 0.12);
                const doorL = new THREE.Mesh(doorGeo, new THREE.MeshStandardMaterial({color: 0x3d0f1e, roughness: 0.85}));
                doorL.position.set(-0.5, 1.18, 0.1);
                const doorR = new THREE.Mesh(doorGeo, new THREE.MeshStandardMaterial({color: 0x3d0f1e, roughness: 0.85}));
                doorR.position.set(0.5, 1.18, 0.1);
                frontGate.add(doorL, doorR);

                keepGroup.add(frontGate);
                rootPivot.add(keepGroup);

                // 激活全组网格投射与阴影接收
                this.castleGroup.traverse(node => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
            }

            // --- 3D 魔法六芒星法阵 (铺在平地 `-7.5` 基准线上) ---
            buildMagicCircle() {
                const circleGroup = new THREE.Group();
                // 置于城堡底部底座上方微小偏移面，防止深度遮挡闪烁
                circleGroup.position.set(0, -7.35, 0);

                const ringGeoOuter = new THREE.RingGeometry(8.6, 8.8, 64);
                const ringGeoInner = new THREE.RingGeometry(7.6, 7.7, 64);
                const lineMat = new THREE.MeshBasicMaterial({
                    color: PALETTE.gold,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0
                });

                const ringOuter = new THREE.Mesh(ringGeoOuter, lineMat);
                ringOuter.rotation.x = Math.PI / 2;
                const ringInner = new THREE.Mesh(ringGeoInner, lineMat);
                ringInner.rotation.x = Math.PI / 2;

                circleGroup.add(ringOuter, ringInner);

                const starPoints = [];
                for (let i = 0; i < 6; i++) {
                    const angle = (i * Math.PI) / 3;
                    starPoints.push(new THREE.Vector3(Math.cos(angle) * 7.6, 0, Math.sin(angle) * 7.6));
                }

                const lineGeom1 = new THREE.BufferGeometry().setFromPoints([
                    starPoints[0], starPoints[2], starPoints[4], starPoints[0]
                ]);
                const lineGeom2 = new THREE.BufferGeometry().setFromPoints([
                    starPoints[1], starPoints[3], starPoints[5], starPoints[1]
                ]);

                const starLine1 = new THREE.Line(lineGeom1, new THREE.LineBasicMaterial({
                    color: PALETTE.gold,
                    transparent: true,
                    opacity: 0
                }));
                const starLine2 = new THREE.Line(lineGeom2, new THREE.LineBasicMaterial({
                    color: PALETTE.gold,
                    transparent: true,
                    opacity: 0
                }));

                circleGroup.add(starLine1, starLine2);

                // 六顶点发光球
                for (let i = 0; i < 6; i++) {
                    const sphereGeo = new THREE.SphereGeometry(0.22, 16, 16);
                    const sphereMat = new THREE.MeshBasicMaterial({
                        color: PALETTE.white,
                        transparent: true,
                        opacity: 0
                    });
                    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                    sphere.position.copy(starPoints[i]);
                    circleGroup.add(sphere);
                }

                this.scene.add(circleGroup);
                this.magicCircle = circleGroup;
                this.magicCircleMaterial = lineMat;
                this.magicStarMaterial = starLine1.material;
            }

            // --- 飘落环境微星颗粒群 ---
            buildFallingStars() {
                const count = 150;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                
                for (let i = 0; i < count * 3; i += 3) {
                    positions[i] = (Math.random() - 0.5) * 60;
                    positions[i+1] = Math.random() * 40;
                    positions[i+2] = (Math.random() - 0.5) * 60;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.15,
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.4
                });

                this.fallingStars = new THREE.Points(geometry, material);
                this.scene.add(this.fallingStars);
            }

            bindEvents() {
                window.addEventListener('resize', () => {
                    this.adjustCameraForViewport();
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                document.getElementById('start-btn').addEventListener('click', () => {
                    document.getElementById('intro-screen').classList.add('hide');
                    this.startEffect();
                });

                document.getElementById('replay-btn').addEventListener('click', () => {
                    this.startEffect();
                });
            }

            startEffect() {
                this.timeline = 0;
                this.lastTime = performance.now();
                this.isPlaying = true;

                // 物理重置为初始埋藏状态 Y = -29
                this.castleGroup.position.y = -29; 
                this.castleGroup.traverse(node => {
                    if (node.isMesh && node.material) {
                        node.material.transparent = true;
                        node.material.opacity = 0;
                    }
                });

                this.windowLights.forEach(win => {
                    win.material.color.setHex(0x140a20);
                });

                // 重置烟花和流萤
                this.initConvergeParticles();
                this.fireworks.forEach(f => this.scene.remove(f.points));
                this.fireworks = [];

                this.leftFireworkTriggered = false;
                this.rightFireworkTriggered = false;
                this.centerFireworkTriggered = false;
            }

            // 0s - 1.5s 开场汇聚粒子系统建立
            initConvergeParticles() {
                if (this.convergeParticles) this.scene.remove(this.convergeParticles);

                const count = 350;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                this.convergeData = [];

                // 精确汇聚到城堡重心微偏上 (0, -4.0, 0)
                const targetY = -4.0; 
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 25 + Math.random() * 15;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    const y = (Math.random() - 0.5) * 15 + 10;

                    positions[i*3] = x;
                    positions[i*3+1] = y;
                    positions[i*3+2] = z;

                    this.convergeData.push({
                        startX: x, startY: y, startZ: z,
                        targetX: 0, targetY: targetY, targetZ: 0,
                        speed: 0.6 + Math.random() * 0.8
                    });
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.35,
                    color: PALETTE.gold,
                    transparent: true,
                    opacity: 1.0,
                    blending: THREE.AdditiveBlending
                });

                this.convergeParticles = new THREE.Points(geometry, material);
                this.scene.add(this.convergeParticles);
            }

            // --- 3D 物理烟花绽放系统 (空气动力学膨胀、尾迹重力坠落) ---
            spawnFirework(x, y, z) {
                const count = 220; 
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const velocities = [];

                const color = PALETTE.fireworks[Math.floor(Math.random() * PALETTE.fireworks.length)];

                for (let i = 0; i < count; i++) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    const speed = 2.5 + Math.random() * 7.5; 

                    const vx = Math.sin(phi) * Math.cos(theta) * speed;
                    const vy = Math.sin(phi) * Math.sin(theta) * speed;
                    const vz = Math.cos(phi) * speed;

                    positions[i*3] = x;
                    positions[i*3+1] = y;
                    positions[i*3+2] = z;

                    velocities.push(new THREE.Vector3(vx, vy, vz));
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.32,
                    color: color,
                    transparent: true,
                    opacity: 1.0,
                    blending: THREE.AdditiveBlending
                });

                const points = new THREE.Points(geometry, material);
                this.scene.add(points);

                this.fireworks.push({
                    points: points,
                    velocities: velocities,
                    opacity: 1.0,
                    life: 1.0,
                    decay: 0.013 + Math.random() * 0.008 
                });
            }

            // 更新物理烟花系统
            updateFireworks() {
                for (let f = this.fireworks.length - 1; f >= 0; f--) {
                    const fw = this.fireworks[f];
                    const positions = fw.points.geometry.attributes.position.array;
                    fw.life -= fw.decay;

                    for (let i = 0; i < fw.velocities.length; i++) {
                        const vel = fw.velocities[i];
                        
                        // 1. 模拟空气摩擦阻力衰减
                        vel.multiplyScalar(0.955);

                        // 2. 真实落体重力加速度
                        vel.y -= 0.13; 

                        positions[i*3] += vel.x * 0.05;
                        positions[i*3+1] += vel.y * 0.05;
                        positions[i*3+2] += vel.z * 0.05;
                    }

                    fw.points.geometry.attributes.position.needsUpdate = true;
                    fw.points.material.opacity = fw.life;

                    // 超越寿命销毁回收
                    if (fw.life <= 0) {
                        this.scene.remove(fw.points);
                        this.fireworks.splice(f, 1);
                    }
                }
            }

            // 状态机核心时间轴控制
            update(now) {
                if (!this.isPlaying) return;

                const dt = (now - this.lastTime) / 1000;
                this.lastTime = now;
                this.timeline += dt;

                const t = this.timeline;

                // 强制12秒关停重置
                if (t >= 12.0) {
                    this.timeline = 12.0;
                    this.isPlaying = false;
                    document.getElementById('hud-title').textContent = "完美谢幕";
                    document.getElementById('hud-timer').textContent = "12.0s / 12.0s";
                    return;
                }

                document.getElementById('hud-timer').textContent = `${t.toFixed(1)}s / 12.0s`;

                // 🕒 0.0s - 1.5s 【开场粒子汇聚】
                if (t < 1.5) {
                    document.getElementById('hud-title').textContent = "开场金色粒子汇聚中...";
                    const progress = t / 1.5;
                    const positions = this.convergeParticles.geometry.attributes.position.array;

                    for (let i = 0; i < this.convergeData.length; i++) {
                        const d = this.convergeData[i];
                        const curP = this.easeOutCubic(progress);
                        positions[i*3] = THREE.MathUtils.lerp(d.startX, d.targetX, curP);
                        positions[i*3+1] = THREE.MathUtils.lerp(d.startY, d.targetY, curP);
                        positions[i*3+2] = THREE.MathUtils.lerp(d.startZ, d.targetZ, curP);
                    }
                    this.convergeParticles.geometry.attributes.position.needsUpdate = true;
                    this.convergeParticles.material.opacity = 1 - progress;

                    // 1.45s 汇聚爆破点稍上移到法阵中心
                    if (t >= 1.45) {
                        this.scene.remove(this.convergeParticles);
                        this.spawnFirework(0, -4, 0); 
                    }
                }

                // 🕒 1.5s - 3.0s 【金色魔法六芒星法阵展开】
                if (t >= 1.5 && t < 3.0) {
                    document.getElementById('hud-title').textContent = "魔法六芒星法阵唤醒...";
                    const progress = (t - 1.5) / 1.5;
                    const scale = this.easeOutBack(progress);
                    
                    this.magicCircleScale = scale;
                    this.magicCircle.scale.set(scale, 1, scale);
                    
                    this.magicCircleMaterial.opacity = Math.min(1.0, progress * 1.5);
                    this.magicStarMaterial.opacity = Math.min(1.0, progress * 1.5);

                    // 顶点光球显示
                    this.magicCircle.children.forEach(child => {
                        if (child.isMesh) child.material.opacity = Math.min(1.0, progress * 1.5);
                    });
                }

                // 魔法阵地表自转
                if (t >= 1.5 && this.magicCircle) {
                    this.magicCircle.rotation.y += 0.015;
                }

                // 🕒 3.0s - 6.0s 【粉白古堡破空升起】
                if (t >= 3.0 && t < 6.0) {
                    document.getElementById('hud-title').textContent = "3D粉白城堡，自星空升起...";
                    const progress = (t - 3.0) / 2.0; 
                    if (progress >= 0 && progress <= 1.0) {
                        const ease = this.easeOutBack(progress);
                        // 自下抬升，最终回归 Y=0 (绝对重心居中)
                        this.castleGroup.position.y = -29 * (1 - ease); 
                        
                        this.castleGroup.traverse(node => {
                            if (node.isMesh && node.material) {
                                node.material.opacity = Math.min(1.0, progress * 1.8);
                            }
                        });
                    } else {
                        this.castleGroup.position.y = 0;
                        this.castleGroup.traverse(node => {
                            if (node.isMesh && node.material) node.material.opacity = 1.0;
                        });
                    }
                }

                // 旗帜微风物理动态模拟 (Waving flags)
                if (this.flags.length > 0) {
                    this.flags.forEach((flag, index) => {
                        flag.rotation.x = Math.sin(now * 0.008 + index) * 0.15;
                        flag.rotation.y = Math.cos(now * 0.005 + index) * 0.1;
                    });
                }

                // 🕒 6.0s - 8.0s 【暖色密集窗户渐次点亮】
                if (t >= 6.0 && t < 8.0) {
                    document.getElementById('hud-title').textContent = "皇家殿堂，窗棂渐次点亮...";
                    const progress = (t - 6.0) / 1.2; 
                    this.windowLights.forEach((win, index) => {
                        const delayOffset = (index / this.windowLights.length) * 0.8;
                        if (progress >= delayOffset) {
                            win.material.color.lerp(new THREE.Color(PALETTE.yellow), 0.12);
                        }
                    });
                }

                // 🕒 8.0s - 10.5s 【三维物理烟花绽放】
                if (t >= 8.0 && t < 10.5) {
                    document.getElementById('hud-title').textContent = "浪漫星原，漫天烟花盛宴...";
                    
                    // 基于城堡 Y 重心向下平移，重置 3D 空间烟花位置
                    // 8.0s 第一波烟花 (城堡左上方)
                    if (t >= 8.0 && t < 8.05 && !this.leftFireworkTriggered) {
                        this.leftFireworkTriggered = true;
                        this.spawnFirework(-10, 8, -4);
                    }

                    // 8.6s 第二波烟花 (城堡右上方)
                    if (t >= 8.6 && t < 8.65 && !this.rightFireworkTriggered) {
                        this.rightFireworkTriggered = true;
                        this.spawnFirework(10, 8, -4);
                    }

                    // 9.2s 第三波烟花 (主尖顶正上方)
                    if (t >= 9.2 && t < 9.25 && !this.centerFireworkTriggered) {
                        this.centerFireworkTriggered = true;
                        this.spawnFirework(0, 16, 0); 
                    }
                }

                // 🕒 10.5s - 12.0s 【谢幕消散】
                if (t >= 10.5) {
                    document.getElementById('hud-title').textContent = "星华谢幕，繁星缓缓消逝...";
                    const fade = (t - 10.5) / 1.5;

                    this.castleGroup.traverse(node => {
                        if (node.isMesh && node.material) {
                            node.material.opacity = Math.max(0, 1.0 - fade);
                        }
                    });

                    if (this.magicCircleMaterial) {
                        this.magicCircleMaterial.opacity = Math.max(0, 1.0 - fade * 1.5);
                        this.magicStarMaterial.opacity = Math.max(0, 1.0 - fade * 1.5);
                    }
                }

                // 更新环境飘雪
                if (this.fallingStars) {
                    const positions = this.fallingStars.geometry.attributes.position.array;
                    for (let i = 1; i < positions.length; i += 3) {
                        positions[i] -= 0.12; 
                        if (positions[i] < -15) positions[i] = 30; // 重设循环高度，贴合平移后新视口
                    }
                    this.fallingStars.geometry.attributes.position.needsUpdate = true;
                }
            }

            easeOutCubic(x) {
                return 1 - Math.pow(1 - x, 3);
            }

            easeOutBack(x) {
                const c1 = 1.70158;
                const c3 = c1 + 1;
                return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
            }

            // 电影级别的相机摇移轨迹
            autoRotateCamera() {
                if (!this.isPlaying) {
                    // 非播放期缓慢匀速环绕
                    const speed = 0.0022;
                    const x = this.camera.position.x;
                    const z = this.camera.position.z;
                    this.camera.position.x = x * Math.cos(speed) - z * Math.sin(speed);
                    this.camera.position.z = x * Math.sin(speed) + z * Math.cos(speed);
                } else {
                    const t = this.timeline;
                    const aspect = window.innerWidth / window.innerHeight;
                    const baseZ = aspect < 1.0 ? 52 : 42; // 移动端竖屏拉远防切边

                    if (t > 0 && t < 3.0) {
                        // 开场及法阵环视
                        this.camera.position.lerp(new THREE.Vector3(0, 15, baseZ), 0.025);
                    } else if (t >= 3.0 && t < 8.0) {
                        // 随着城堡抬升，缓慢移动到右前方 45 度侧角，极具立体气魄
                        this.camera.position.lerp(new THREE.Vector3(6, 6, baseZ - 8), 0.015);
                    } else if (t >= 8.0) {
                        // 烟花展示，镜头后撤进入全景宏观仰视
                        this.camera.position.lerp(new THREE.Vector3(-12, 18, baseZ + 4), 0.02);
                    }
                }
                // 【锁定聚焦目标为世界重心 (0, -2, 0)，确保手机全高绝对正居中，不偏离视窗】
                this.camera.lookAt(0, -2, 0); 
            }

            // 三维帧循环
            animate() {
                const now = performance.now();
                
                this.update(now);
                this.updateFireworks();
                this.autoRotateCamera();

                this.controls.update(); 
                this.renderer.render(this.scene, this.camera);

                requestAnimationFrame(() => this.animate());
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new Gift3DEngine();
        });
    </script>
