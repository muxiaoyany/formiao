<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D梦幻城堡 - 抖音直播礼物特效完美还原</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 引入高雅的中英文字体组合 -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030107;
            font-family: 'Noto Serif SC', 'Cinzel', serif;
            color: #e2e8f0;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 磨砂全息控制面板 */
        .hud-overlay {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: auto;
            background: rgba(13, 5, 32, 0.55);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px rgba(255, 105, 180, 0.3) solid;
            border-radius: 30px;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 15px rgba(255, 105, 180, 0.05);
            transition: all 0.3s ease;
        }

        .hud-overlay:hover {
            border-color: rgba(255, 105, 180, 0.6);
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.25);
        }

        .gift-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .gift-icon {
            font-size: 24px;
            animation: bounce 2s infinite alternate;
        }

        .gift-text {
            display: flex;
            flex-direction: column;
        }

        .gift-title {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 14px;
            color: #ffb6c1;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.5);
        }

        .gift-status {
            font-size: 10px;
            color: rgba(226, 232, 240, 0.6);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* 重播控制 */
        .control-btn {
            background: rgba(255, 105, 180, 0.15);
            border: 1px rgba(255, 105, 180, 0.45) solid;
            color: #ffb6c1;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
            letter-spacing: 1.5px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .control-btn:hover {
            background: rgba(255, 105, 180, 0.35);
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
            transform: translateY(-1px);
        }

        /* 引导遮罩 */
        .intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(8, 3, 20, 0.98);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .intro-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .castle-logo {
            font-size: 72px;
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.6));
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }

        .intro-title {
            font-family: 'Cinzel', serif;
            font-size: 26px;
            font-weight: 900;
            color: #ffb6c1;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
            margin-bottom: 8px;
            text-align: center;
        }

        .intro-subtitle {
            font-size: 12px;
            color: rgba(226, 232, 240, 0.55);
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 90%;
            line-height: 1.5;
        }

        .start-btn {
            background: linear-gradient(135deg, #ffb6c1, #ff69b4);
            border: none;
            color: #0d0520;
            padding: 14px 44px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 3px;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(255, 105, 180, 0.6);
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }
    </style>

    <!-- 导入 Three.js 及 OrbitControls 轨道控制器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <!-- 引导界面 -->
    <div class="intro-screen" id="intro-screen">
        <div class="castle-logo">🏰</div>
        <h1 class="intro-title">ROYAL EPIC CASTLE</h1>
        <p class="intro-subtitle">1:1 精密雕琢哥特式白瓷法阵城堡 · 物理烟花盛宴</p>
        <button class="start-btn" id="start-btn">开启奢华 3D 星空</button>
    </div>

    <!-- 顶端悬浮 HUD -->
    <div class="hud-overlay">
        <div class="gift-info">
            <span class="gift-icon">🏰</span>
            <div class="gift-text">
                <span class="gift-title" id="hud-title">等待开启...</span>
                <span class="gift-status" id="hud-timer">0.0s / 12.0s</span>
            </div>
        </div>
        <button class="control-btn" id="replay-btn">重播特效</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // =========================================================================
        // 《3D 皇家梦幻城堡与物理烟花》- 1:1 雕塑级重构版
        // =========================================================================

        const PALETTE = {
            porcelain: 0xffffff,    // 象牙珍珠白（城堡高光滑腻石料）
            roofPorcelain: 0xeaecef, // 浅灰瓷顶瓦
            gold: 0xffd700,         // 电镀皇家金
            bgTop: 0x030107,        // 深邃夜空顶
            bgBottom: 0x0e051c,     // 地平线蓝紫晕光
            fireworks: [0xff2a6d, 0x05d9e8, 0x01012b, 0xf5a623, 0xb9ff00, 0xff007f]
        };

        class Gift3DEngine {
            constructor() {
                this.container = document.getElementById('canvas-container');
                
                this.timeline = 0;
                this.lastTime = performance.now();
                this.isPlaying = false;

                // 3D 场景与高精度雾化效果
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x030107, 0.014);

                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.adjustCameraForViewport();

                // 启用完美抗锯齿渲染
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.setClearColor(PALETTE.bgTop, 1);
                this.container.appendChild(this.renderer.domElement);

                // 轨道阻尼
                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxPolarAngle = Math.PI / 2 - 0.05; 
                this.controls.minDistance = 15;
                this.controls.maxDistance = 120;
                this.controls.target.set(0, 0, 0);

                // 核心节点群组
                this.castleGroup = new THREE.Group();
                this.scene.add(this.castleGroup);

                this.magicCircle = null;
                this.windowLights = [];
                this.solidMeshes = []; // 收集所有非玻璃实体，用于在升起后关闭透明模式
                this.flags = []; 
                this.fireworks = []; 

                this.convergeParticles = null;
                this.fallingStars = null;

                // 生成高亮彩虹玻璃贴图
                this.stainedGlassTexture = this.createStainedGlassTexture();

                this.setupLights();
                this.buildCastle();
                this.buildMagicCircle();
                this.buildFallingStars();
                this.bindEvents();

                window.onload = () => {
                    this.animate();
                };
            }

            // 生成高度鲜明的哥特极光彩绘玻璃渐变
            createStainedGlassTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                
                const grad = ctx.createLinearGradient(0, 0, 0, 256);
                grad.addColorStop(0, '#ffe066');
                grad.addColorStop(0.35, '#f03e3e');
                grad.addColorStop(0.7, '#ae3ec9');
                grad.addColorStop(1, '#15aabf');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 128, 256);

                // 细密窗花格线
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.45)'; 
                ctx.lineWidth = 4;
                for (let i = 0; i <= 128; i += 32) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 256); ctx.stroke();
                }
                for (let j = 0; j <= 256; j += 64) {
                    ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(128, j); ctx.stroke();
                }
                
                const texture = new THREE.CanvasTexture(canvas);
                return texture;
            }

            adjustCameraForViewport() {
                const aspect = window.innerWidth / window.innerHeight;
                if (aspect < 1.0) {
                    this.camera.position.set(0, 16, 45);
                } else {
                    this.camera.position.set(0, 12, 36);
                }
            }

            setupLights() {
                // 环境反射紫光，突出暗面神秘感
                const ambientLight = new THREE.AmbientLight(0x1a102e, 2.5);
                this.scene.add(ambientLight);

                // 主投射暖白光，刻画城堡完美的珍珠瓷轮廓，生成极富立体感的软阴影
                this.dirLight = new THREE.DirectionalLight(0xffffff, 3.2);
                this.dirLight.position.set(20, 40, 25);
                this.dirLight.castShadow = true;
                this.dirLight.shadow.mapSize.width = 2048;
                this.dirLight.shadow.mapSize.height = 2048;
                this.dirLight.shadow.bias = -0.0004;
                this.dirLight.shadow.camera.near = 10;
                this.dirLight.shadow.camera.far = 100;
                const d = 15;
                this.dirLight.shadow.camera.left = -d;
                this.dirLight.shadow.camera.right = d;
                this.dirLight.shadow.camera.top = d;
                this.dirLight.shadow.camera.bottom = -d;
                this.scene.add(this.dirLight);

                // 极具渲染张力的紫粉色边缘逆光
                this.fillLight = new THREE.DirectionalLight(0xe03131, 1.5);
                this.fillLight.position.set(-20, 10, -20);
                this.scene.add(this.fillLight);

                // 聚光灯：笔直打在至尊双塔顶，提供局部强烈高光反射
                this.spotLight = new THREE.SpotLight(0xffffff, 2.5);
                this.spotLight.position.set(0, 50, 0);
                this.spotLight.angle = Math.PI / 5;
                this.spotLight.penumbra = 0.8;
                this.scene.add(this.spotLight);
            }

            // === 纯手工精确绘制哥特尖拱（Gothic Arch）数学形状曲线 ===
            getGothicArchShape(w, h) {
                const shape = new THREE.Shape();
                const straightH = h - w / 2; // 垂直段高度
                shape.moveTo(-w / 2, 0);
                shape.lineTo(-w / 2, straightH);
                // 使用控制点拉出完美的对称哥特式尖顶曲线
                shape.quadraticCurveTo(-w / 2, h, 0, h);
                shape.quadraticCurveTo(w / 2, h, w / 2, straightH);
                shape.lineTo(w / 2, 0);
                shape.closePath();
                return shape;
            }

            // === 1:1 复刻级城堡三维雕刻 ===
            buildCastle() {
                // 1. 材质声明（高精度的材质属性是还原艺术感的绝对秘诀）
                const porcelainMaterial = new THREE.MeshStandardMaterial({
                    color: PALETTE.porcelain,
                    roughness: 0.15,
                    metalness: 0.08,
                    side: THREE.DoubleSide
                });

                const roofMaterial = new THREE.MeshStandardMaterial({
                    color: PALETTE.roofPorcelain,
                    roughness: 0.22,
                    metalness: 0.05,
                    side: THREE.DoubleSide
                });

                const goldMaterial = new THREE.MeshStandardMaterial({
                    color: PALETTE.gold,
                    roughness: 0.05,
                    metalness: 0.95
                });

                // 自发光彩虹拼花玻璃
                const glassMaterial = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    map: this.stainedGlassTexture,
                    emissiveMap: this.stainedGlassTexture,
                    emissive: 0xffffff,
                    emissiveIntensity: 0.9,
                    roughness: 0.05,
                    metalness: 0.1,
                    transparent: true,
                    opacity: 0.92,
                    side: THREE.DoubleSide
                });

                // 2. 哥特拱形浮雕窗生成器
                const createGothicWindow = (x, y, z, rY, w, h, parent, isMain = false) => {
                    const winGroup = new THREE.Group();
                    winGroup.position.set(x, y, z);
                    winGroup.rotation.y = rY;

                    // 1:1 数学曲线彩色窗心
                    const shape = this.getGothicArchShape(w, h);
                    const glassGeo = new THREE.ShapeGeometry(shape);
                    // 居中偏移以便完美贴壁
                    const glassMesh = new THREE.Mesh(glassGeo, glassMaterial.clone());
                    glassMesh.position.set(0, 0, 0.02);
                    winGroup.add(glassMesh);
                    this.windowLights.push(glassMesh);

                    // 精细金色窗框描边
                    const extrudeSettings = { depth: 0.08, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.02, bevelThickness: 0.02 };
                    const frameGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                    const frameMesh = new THREE.Mesh(frameGeo, goldMaterial);
                    frameMesh.position.set(0, 0, -0.04);
                    winGroup.add(frameMesh);
                    this.solidMeshes.push(frameMesh);

                    if (isMain) {
                        // 顶部金色尖锐的哥特式悬索尖角（Pinnacle Gable）
                        const pinGeo = new THREE.ConeGeometry(w/2 + 0.06, 0.5, 4);
                        const pin = new THREE.Mesh(pinGeo, goldMaterial);
                        pin.rotation.y = Math.PI / 4;
                        pin.position.y = h + 0.25;
                        winGroup.add(pin);
                        this.solidMeshes.push(pin);
                    }

                    parent.add(winGroup);
                };

                // 3. 至高顶端金色皇冠风铃与多曲十字风向标
                const createTopCrest = (x, y, z, parent) => {
                    const crestGroup = new THREE.Group();
                    crestGroup.position.set(x, y, z);

                    // 中心主金杆
                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 2.0, 8), goldMaterial);
                    crestGroup.add(pole);

                    // 黄金皇冠
                    const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.28, 0.25, 12), goldMaterial);
                    crown.position.y = 0.6;
                    crestGroup.add(crown);

                    // 十字多向弯折导风翼
                    const curve1 = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.04, 8, 20, Math.PI), goldMaterial);
                    curve1.rotation.y = 0;
                    curve1.position.y = 1.0;
                    const curve2 = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.04, 8, 20, Math.PI), goldMaterial);
                    curve2.rotation.y = Math.PI / 2;
                    curve2.position.y = 1.0;
                    crestGroup.add(curve1, curve2);

                    const star = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), goldMaterial);
                    star.position.y = 1.45;
                    crestGroup.add(star);

                    parent.add(crestGroup);
                    this.solidMeshes.push(pole, crown, curve1, curve2, star);
                };

                // === 坐标系统下移 6.5，保证竖屏/横屏在 3D 空间内视觉水平线完美居中 ===
                const rootPivot = new THREE.Group();
                rootPivot.position.y = -6.5; 
                this.castleGroup.add(rootPivot);

                // === A. 八角白瓷阶梯大底盘 ===
                const baseGroup = new THREE.Group();
                const base1 = new THREE.Mesh(new THREE.CylinderGeometry(9.6, 10.2, 1.4, 8), porcelainMaterial);
                base1.position.y = 0.7;
                baseGroup.add(base1);

                // 双层收缩黄金台阶包边，断绝简陋与粗糙
                const trim1 = new THREE.Mesh(new THREE.CylinderGeometry(9.7, 9.7, 0.15, 8), goldMaterial);
                trim1.position.y = 1.42;
                const base2 = new THREE.Mesh(new THREE.CylinderGeometry(8.4, 8.8, 0.8, 8), porcelainMaterial);
                base2.position.y = 1.8;
                baseGroup.add(trim1, base2);
                rootPivot.add(baseGroup);
                this.solidMeshes.push(base1, trim1, base2);

                // === B. 前置皇家白瓷台阶（带圆柱球冠扶手） ===
                const stepsGroup = new THREE.Group();
                stepsGroup.position.set(0, 0.0, 8.4);

                const stepsCount = 6;
                for (let i = 0; i < stepsCount; i++) {
                    const stepW = 4.0 - i * 0.25;
                    const stepH = 0.22;
                    const stepD = 1.1 + i * 0.15;
                    const step = new THREE.Mesh(new THREE.BoxGeometry(stepW, stepH, stepD), porcelainMaterial);
                    step.position.set(0, stepH * i + 0.11, -i * 0.1);
                    stepsGroup.add(step);
                    this.solidMeshes.push(step);
                }

                // 雕刻两侧端坐的台阶圆形扶手饰（1:1完美还原原图中的台阶细节）
                const railL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.3, 1.8), porcelainMaterial);
                railL.position.set(-2.1, 0.7, -0.4);
                railL.rotation.x = -0.25;
                const ballL = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), porcelainMaterial);
                ballL.position.set(-2.1, 0.45, 0.6);
                const goldBallL = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12, 12), goldMaterial);
                goldBallL.position.set(-2.1, 0.8, 0.6);

                const railR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.3, 1.8), porcelainMaterial);
                railR.position.set(2.1, 0.7, -0.4);
                railR.rotation.x = -0.25;
                const ballR = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), porcelainMaterial);
                ballR.position.set(2.1, 0.45, 0.6);
                const goldBallR = new THREE.Mesh(new THREE.SphereGeometry(0.15, 12, 12), goldMaterial);
                goldBallR.position.set(2.1, 0.8, 0.6);

                stepsGroup.add(railL, ballL, goldBallL, railR, ballR, goldBallR);
                rootPivot.add(stepsGroup);
                this.solidMeshes.push(railL, ballL, goldBallL, railR, ballR, goldBallR);

                // === C. 核心主殿大堂（Main Sanctuary Hall） ===
                const mainHallGroup = new THREE.Group();
                mainHallGroup.position.set(0, 2.2, 0);

                const hallWall = new THREE.Mesh(new THREE.BoxGeometry(7.0, 5.6, 7.8), porcelainMaterial);
                hallWall.position.y = 2.8;
                mainHallGroup.add(hallWall);
                this.solidMeshes.push(hallWall);

                // 殿侧装饰性拱形柱肋
                for (let i = -3.2; i <= 3.2; i += 1.6) {
                    if (Math.abs(i) < 0.1) continue;
                    const ribL = new THREE.Mesh(new THREE.BoxGeometry(0.15, 5.6, 0.4), goldMaterial);
                    ribL.position.set(-3.52, 2.8, i);
                    const ribR = new THREE.Mesh(new THREE.BoxGeometry(0.15, 5.6, 0.4), goldMaterial);
                    ribR.position.set(3.52, 2.8, i);
                    mainHallGroup.add(ribL, ribR);
                    this.solidMeshes.push(ribL, ribR);
                }

                // 主殿顶端倾斜人字尖脊屋瓦
                const roofShape = new THREE.Shape();
                roofShape.moveTo(-3.5, 0);
                roofShape.lineTo(0, 3.5);
                roofShape.lineTo(3.5, 0);
                roofShape.closePath();
                const roofExtSettings = { depth: 8.0, bevelEnabled: false };
                const roofGeom = new THREE.ExtrudeGeometry(roofShape, roofExtSettings);
                const roofMesh = new THREE.Mesh(roofGeom, roofMaterial);
                // 完美套在主殿天花板
                roofMesh.position.set(0, 5.6, -4.0);
                mainHallGroup.add(roofMesh);
                this.solidMeshes.push(roofMesh);

                rootPivot.add(mainHallGroup);

                // === D. 震撼前卫门廊与玫瑰窗（Grand Cathedral Portal & Rose Window） ===
                const portalGroup = new THREE.Group();
                portalGroup.position.set(0, 2.2, 6.4); // 探出门脸突出立体度

                // 牌楼骨架
                const portalBody = new THREE.Mesh(new THREE.BoxGeometry(3.8, 4.4, 1.2), porcelainMaterial);
                portalBody.position.y = 2.2;
                portalGroup.add(portalBody);
                this.solidMeshes.push(portalBody);

                // 1:1 数学级哥特尖拱门廊套圈（三层同心缩进）
                for (let i = 0; i < 3; i++) {
                    const pW = 1.6 - i * 0.25;
                    const pH = 2.4 - i * 0.2;
                    const archShape = this.getGothicArchShape(pW, pH);

                }

                // 发光的哥特主拱大门彩色窗
                const mainDoorShape = this.getGothicArchShape(1.1, 2.0);

                // 牌楼顶部金色勾边三角山墙（Gabled Roofpediment）
                const triangShape = new THREE.Shape();
                triangShape.moveTo(-1.9, 0);
                triangShape.lineTo(0, 2.4);

                triangShape.closePath();
                const triangGeo = new THREE.ExtrudeGeometry(triangShape, { depth: 0.2, bevelEnabled: false });
                const triangMesh = new THREE.Mesh(triangGeo, porcelainMaterial);
                triangMesh.position.set(0, 4.4, -0.4);
                portalGroup.add(triangMesh);
                this.solidMeshes.push(triangMesh);

                const gableGoldL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.6, 0.22), goldMaterial);
                gableGoldL.position.set(-0.95, 5.6, -0.3);
                gableGoldL.rotation.z = 0.65;
                const gableGoldR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 2.6, 0.22), goldMaterial);
                gableGoldR.position.set(0.95, 5.6, -0.3);
                gableGoldR.rotation.z = -0.65;
                portalGroup.add(gableGoldL, gableGoldR);
                this.solidMeshes.push(gableGoldL, gableGoldR);

                // 圣光玫瑰圆窗
                const roseGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.15, 24);
                const roseMesh = new THREE.Mesh(roseGeo, glassMaterial);
                roseMesh.rotation.x = Math.PI / 2;
                roseMesh.position.set(0, 5.3, -0.15);
                portalGroup.add(roseMesh);
                this.windowLights.push(roseMesh);

                // 玫瑰窗黄金雕花同心外圈
                const roseBorder = new THREE.Mesh(new THREE.TorusGeometry(0.62, 0.05, 8, 24), goldMaterial);
                roseBorder.position.set(0, 5.3, -0.06);
                portalGroup.add(roseBorder);
                this.solidMeshes.push(roseBorder);

                rootPivot.add(portalGroup);

                // === E. 前置对称双矮卫塔（Front Guard Towers） ===
                const buildFrontTurret = (xSide) => {
                    const turret = new THREE.Group();
                    turret.position.set(xSide * 4.4, 2.2, 5.0);

                    // 多阶白色瓷柱壁
                    const t1 = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 1.05, 4.0, 12), porcelainMaterial);

                    const rim = new THREE.Mesh(new THREE.CylinderGeometry(1.05, 1.05, 0.3, 12), goldMaterial);
                    rim.position.y = 4.0;
                    turret.add(rim);

                    // 尖耸白瓷高锥帽
                    const sp = new THREE.Mesh(new THREE.ConeGeometry(1.05, 3.2, 12), roofMaterial);
                    sp.position.y = 5.6;
                    turret.add(sp);

                    // 顶部可爱金色小旗
                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.9, 8), goldMaterial);
                    pole.position.y = 7.45;
                    const fl = new THREE.Mesh(new THREE.ConeGeometry(0.24, 0.5, 4), new THREE.MeshStandardMaterial({ color: xSide < 0 ? 0xff4a5a : 0x00f5ff }));
                    fl.rotation.z = Math.PI / 2;
                    fl.position.set(0.2, 7.7, 0);
                    turret.add(pole, fl);
                    this.flags.push(fl);

                    // 雕花采光窗
                    createGothicWindow(xSide * 0.86, 2.2, 0, xSide * Math.PI / 2, 0.4, 0.8, turret);

                    rootPivot.add(turret);
                    this.solidMeshes.push(t1, rim, sp, pole);
                };
                buildFrontTurret(-1);
                buildFrontTurret(1);

                // === F. 中部对称多重壁挂拱耳塔（Middle Flank Turrets） ===
                const buildMiddleSpire = (xSide) => {
                    const spire = new THREE.Group();
                    spire.position.set(xSide * 4.6, 2.2, -0.4);

                    // 塔柱
                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.95, 1.15, 5.5, 12), porcelainMaterial);
                    body.position.y = 2.75;
                    spire.add(body);

                    // 金腰带
                    const trim = new THREE.Mesh(new THREE.CylinderGeometry(1.05, 1.05, 0.15, 12), goldMaterial);
                    trim.position.y = 5.5;
                    spire.add(trim);

                    // 圆台围网露台
                    const balcony = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 0.45, 12), porcelainMaterial);
                    balcony.position.y = 5.8;
                    const balu = new THREE.Mesh(new THREE.CylinderGeometry(1.32, 1.32, 0.3, 12, 1, true), goldMaterial);
                    balu.position.y = 6.15;
                    spire.add(balcony, balu);

                    // 收缩上段塔
                    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 3.8, 12), porcelainMaterial);
                    upper.position.y = 7.9;
                    spire.add(upper);

                    // 纤细锥顶
                    const roof = new THREE.Mesh(new THREE.ConeGeometry(0.86, 3.2, 12), roofMaterial);
                    roof.position.y = 11.2;
                    spire.add(roof);

                    // 小旗
                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.8, 8), goldMaterial);
                    pole.position.y = 13.1;
                    const fl = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.45, 4), new THREE.MeshStandardMaterial({ color: xSide < 0 ? 0xffbf00 : 0xe03131 }));
                    fl.rotation.z = Math.PI / 2;
                    fl.position.set(0.18, 13.3, 0);
                    spire.add(pole, fl);
                    this.flags.push(fl);

                    createGothicWindow(0, 8.0, 0.82, 0, 0.42, 0.9, spire, true);

                    rootPivot.add(spire);
                    this.solidMeshes.push(body, trim, balcony, balu, upper, roof, pole);
                };
                buildMiddleSpire(-1);
                buildMiddleSpire(1);

                // === G. 至尊！100%还原后置双子至尊圣殿大高塔（Double Master Spires） ===
                const buildGrandMasterSpire = (xSide) => {
                    const master = new THREE.Group();
                    // 紧密靠拢在后侧
                    master.position.set(xSide * 1.5, 2.2, -4.2);

                    // 第一层：宏大的正八角型白瓷塔柱（比圆柱立体10倍）
                    const f1 = new THREE.Mesh(new THREE.CylinderGeometry(1.15, 1.35, 7.6, 8), porcelainMaterial);
                    f1.position.y = 3.8;
                    master.add(f1);

                    // 八个角上的垂直凸出肋条支架（Buttresses），光影错落极致奢华
                    for (let i = 0; i < 8; i++) {
                        const angle = (i * Math.PI) / 4;
                        const but = new THREE.Mesh(new THREE.BoxGeometry(0.12, 7.6, 0.25), goldMaterial);
                        but.position.set(Math.cos(angle) * 1.25, 3.8, Math.sin(angle) * 1.25);

                        master.add(but);

                    }

                    // 金色齿型冠环
                    const f1Trim = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.22, 2.3), goldMaterial);
                    f1Trim.position.y = 7.7;

                    // 第二层：精致金色中空钟殿廊柱（Gallery）
                    const f2 = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 0.9, 4.4, 8), porcelainMaterial);
                    f2.position.y = 10.0;
                    master.add(f2);

                    // 8根金色柱（1:1复刻彩带圆窗结构）

                        col.position.set(Math.cos(angle) * 0.95, 10.0, Math.sin(angle) * 0.95);
                        master.add(col);
                        this.solidMeshes.push(col);
                    }

                    // 钟殿深处的彩色发光主芯窗（光影质感拉满）
                    const coreGlass = new THREE.Mesh(new THREE.CylinderGeometry(0.72, 0.72, 4.0, 8), glassMaterial);
                    coreGlass.position.y = 10.0;

                    this.windowLights.push(coreGlass);

                    // 至尊高空纤细哥特尖瓦顶
                    const roof = new THREE.Mesh(new THREE.ConeGeometry(0.72, 5.5, 12), roofMaterial);

                    master.add(roof);

                    // 尖顶上细致纵向金色排条
                    for (let i = 0; i < 6; i++) {

                        const rib = new THREE.Mesh(new THREE.BoxGeometry(0.04, 5.5, 0.06), goldMaterial);
                        rib.position.set(Math.cos(angle) * 0.35, 17.75, Math.sin(angle) * 0.35);
                        rib.rotation.y = -angle;
                        rib.rotation.z = -xSide * 0.06; // 向尖角略微倾斜
                        master.add(rib);
                        this.solidMeshes.push(rib);
                    }

                    // 金色风向十字冠华
                    createTopCrest(0, 20.4, 0, master);

                    // 阁楼装饰窗
                    createGothicWindow(0, 13.6, 0.7, 0, 0.32, 0.75, master, true);

                    rootPivot.add(master);
                    this.solidMeshes.push(f1, f1Trim, f2, f3, roof);
                };
                buildGrandMasterSpire(-1);
                buildGrandMasterSpire(1);

                // === H. 远景极窄飞扶柱与高空拱形跨梁桥（Rear Flying Buttresses） ===
                const buildRearSmallTurret = (xSide) => {
                    const small = new THREE.Group();
                    small.position.set(xSide * 4.8, 2.2, -5.0);

                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.58, 0.68, 8.0, 10), porcelainMaterial);
                    body.position.y = 4.0;
                    small.add(body);

                    const roof = new THREE.Mesh(new THREE.ConeGeometry(0.68, 2.8, 10), roofMaterial);
                    roof.position.y = 9.4;
                    small.add(roof);

                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.7, 8), goldMaterial);
                    pole.position.y = 10.8;
                    const fl = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.4, 4), new THREE.MeshStandardMaterial({ color: 0xda70d6 }));
                    fl.rotation.z = Math.PI / 2;
                    fl.position.set(0.15, 11.0, 0);
                    small.add(pole, fl);
                    this.flags.push(fl);

                    rootPivot.add(small);
                    this.solidMeshes.push(body, roof, pole);

                    // 1:1复刻飞扶连廊：从后方高塔架设彩虹金石拱梁，连通到侧翼耳塔
                    const bridge = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.28, 0.45), porcelainMaterial);
                    bridge.position.set(xSide * 3.1, 8.0, -4.5);
                    bridge.rotation.z = -xSide * 0.28; 
                    const bridgeTrim = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.08, 0.48), goldMaterial);
                    bridgeTrim.position.set(xSide * 3.1, 8.16, -4.5);
                    bridgeTrim.rotation.z = -xSide * 0.28;
                    rootPivot.add(bridge, bridgeTrim);
                    this.solidMeshes.push(bridge, bridgeTrim);
                };
                buildRearSmallTurret(-1);
                buildRearSmallTurret(1);

                // 统一开启高精度动态投影映射
                this.castleGroup.traverse(node => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
            }

            // --- 3D 魔法六芒星法阵（铺于底座上方 `-6.32` 切面，100%抗闪烁遮挡） ---
            buildMagicCircle() {
                const circleGroup = new THREE.Group();
                circleGroup.position.set(0, -6.32, 0);

                const ringGeoOuter = new THREE.RingGeometry(9.0, 9.2, 64);
                const ringGeoInner = new THREE.RingGeometry(8.0, 8.1, 64);
                const lineMat = new THREE.MeshBasicMaterial({
                    color: PALETTE.gold,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0
                });

                const ringOuter = new THREE.Mesh(ringGeoOuter, lineMat);
                ringOuter.rotation.x = Math.PI / 2;
                const ringInner = new THREE.Mesh(ringGeoInner, lineMat);
                ringInner.rotation.x = Math.PI / 2;

                circleGroup.add(ringOuter, ringInner);

                const starPoints = [];
                for (let i = 0; i < 6; i++) {
                    const angle = (i * Math.PI) / 3;
                    starPoints.push(new THREE.Vector3(Math.cos(angle) * 8.0, 0, Math.sin(angle) * 8.0));
                }

                const lineGeom1 = new THREE.BufferGeometry().setFromPoints([
                    starPoints[0], starPoints[2], starPoints[4], starPoints[0]
                ]);
                const lineGeom2 = new THREE.BufferGeometry().setFromPoints([
                    starPoints[1], starPoints[3], starPoints[5], starPoints[1]
                ]);

                const starLine1 = new THREE.Line(lineGeom1, new THREE.LineBasicMaterial({
                    color: PALETTE.gold,
                    transparent: true,
                    opacity: 0
                }));
                const starLine2 = new THREE.Line(lineGeom2, new THREE.LineBasicMaterial({
                    color: PALETTE.gold,
                    transparent: true,
                    opacity: 0
                }));

                circleGroup.add(starLine1, starLine2);

                // 六顶点魔法水晶球
                for (let i = 0; i < 6; i++) {
                    const sphereGeo = new THREE.SphereGeometry(0.24, 16, 16);
                    const sphereMat = new THREE.MeshBasicMaterial({
                        color: 0xffffff,
                        transparent: true,
                        opacity: 0
                    });
                    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                    sphere.position.copy(starPoints[i]);
                    circleGroup.add(sphere);
                }

                this.scene.add(circleGroup);
                this.magicCircle = circleGroup;
                this.magicCircleMaterial = lineMat;
                this.magicStarMaterial = starLine1.material;
            }

            // --- 飘落环境微金微光星尘 ---
            buildFallingStars() {
                const count = 180;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                
                for (let i = 0; i < count * 3; i += 3) {
                    positions[i] = (Math.random() - 0.5) * 60;
                    positions[i+1] = Math.random() * 40;
                    positions[i+2] = (Math.random() - 0.5) * 60;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.15,
                    color: 0xffe57f,
                    transparent: true,
                    opacity: 0.5,
                    blending: THREE.AdditiveBlending
                });

                this.fallingStars = new THREE.Points(geometry, material);
                this.scene.add(this.fallingStars);
            }

            bindEvents() {
                window.addEventListener('resize', () => {
                    this.adjustCameraForViewport();
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                document.getElementById('start-btn').addEventListener('click', () => {
                    document.getElementById('intro-screen').classList.add('hide');
                    this.startEffect();
                });

                document.getElementById('replay-btn').addEventListener('click', () => {
                    this.startEffect();
                });
            }

            startEffect() {
                this.timeline = 0;
                this.lastTime = performance.now();
                this.isPlaying = true;

                // 初始状态：城堡深埋于地下 Y = -30，强制所有白色和金色模型处于淡入透明模式
                this.castleGroup.position.y = -30; 
                this.castleGroup.traverse(node => {
                    if (node.isMesh && node.material) {
                        node.material.transparent = true;
                        node.material.opacity = 0;
                    }
                });

                // 重置窗户发光状态
                this.windowLights.forEach(win => {
                    win.material.emissiveIntensity = 0.05;
                });

                this.initConvergeParticles();
                this.fireworks.forEach(f => this.scene.remove(f.points));
                this.fireworks = [];

                this.leftFireworkTriggered = false;
                this.rightFireworkTriggered = false;
                this.centerFireworkTriggered = false;
                this.solidStateLocked = false;
            }

            // 金光气旋汇聚
            initConvergeParticles() {
                if (this.convergeParticles) this.scene.remove(this.convergeParticles);

                const count = 420;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                this.convergeData = [];

                const targetY = -4.0; 
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 24 + Math.random() * 12;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    const y = (Math.random() - 0.5) * 15 + 8;

                    positions[i*3] = x;
                    positions[i*3+1] = y;
                    positions[i*3+2] = z;

                    this.convergeData.push({
                        startX: x, startY: y, startZ: z,
                        targetX: 0, targetY: targetY, targetZ: 0,
                        speed: 0.7 + Math.random() * 0.7
                    });
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.35,
                    color: PALETTE.gold,
                    transparent: true,
                    opacity: 1.0,
                    blending: THREE.AdditiveBlending
                });

                this.convergeParticles = new THREE.Points(geometry, material);
                this.scene.add(this.convergeParticles);
            }

            // 三维空气动力学物理烟花系统
            spawnFirework(x, y, z) {
                const count = 260; 
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const velocities = [];

                const color = PALETTE.fireworks[Math.floor(Math.random() * PALETTE.fireworks.length)];

                for (let i = 0; i < count; i++) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    const speed = 2.0 + Math.random() * 8.0; 

                    const vx = Math.sin(phi) * Math.cos(theta) * speed;
                    const vy = Math.sin(phi) * Math.sin(theta) * speed;
                    const vz = Math.cos(phi) * speed;

                    positions[i*3] = x;
                    positions[i*3+1] = y;
                    positions[i*3+2] = z;

                    velocities.push(new THREE.Vector3(vx, vy, vz));
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.35,
                    color: color,
                    transparent: true,
                    opacity: 1.0,
                    blending: THREE.AdditiveBlending
                });

                const points = new THREE.Points(geometry, material);
                this.scene.add(points);

                this.fireworks.push({
                    points: points,
                    velocities: velocities,
                    opacity: 1.0,
                    life: 1.0,
                    decay: 0.012 + Math.random() * 0.008 
                });
            }

            updateFireworks() {
                for (let f = this.fireworks.length - 1; f >= 0; f--) {
                    const fw = this.fireworks[f];
                    const positions = fw.points.geometry.attributes.position.array;
                    fw.life -= fw.decay;

                    for (let i = 0; i < fw.velocities.length; i++) {
                        const vel = fw.velocities[i];
                        
                        vel.multiplyScalar(0.96); // 空气摩擦
                        vel.y -= 0.12;            // 重力加速下坠

                        positions[i*3] += vel.x * 0.05;
                        positions[i*3+1] += vel.y * 0.05;
                        positions[i*3+2] += vel.z * 0.05;
                    }

                    fw.points.geometry.attributes.position.needsUpdate = true;
                    fw.points.material.opacity = fw.life;

                    if (fw.life <= 0) {
                        this.scene.remove(fw.points);
                        this.fireworks.splice(f, 1);
                    }
                }
            }

            // 状态机时间轴主循环
            update(now) {
                if (!this.isPlaying) return;

                const dt = (now - this.lastTime) / 1000;
                this.lastTime = now;
                this.timeline += dt;

                const t = this.timeline;

                if (t >= 12.0) {
                    this.timeline = 12.0;
                    this.isPlaying = false;
                    document.getElementById('hud-title').textContent = "完美谢幕";
                    document.getElementById('hud-timer').textContent = "12.0s / 12.0s";
                    return;
                }

                document.getElementById('hud-timer').textContent = `${t.toFixed(1)}s / 12.0s`;

                // 🕒 0.0s - 1.5s 【金色气旋粒子汇聚】
                if (t < 1.5) {
                    document.getElementById('hud-title').textContent = "皇家金尘，粒子交织汇聚中...";
                    const progress = t / 1.5;
                    const positions = this.convergeParticles.geometry.attributes.position.array;

                    for (let i = 0; i < this.convergeData.length; i++) {
                        const d = this.convergeData[i];
                        const curP = this.easeOutCubic(progress);
                        positions[i*3] = THREE.MathUtils.lerp(d.startX, d.targetX, curP);
                        positions[i*3+1] = THREE.MathUtils.lerp(d.startY, d.targetY, curP);
                        positions[i*3+2] = THREE.MathUtils.lerp(d.startZ, d.targetZ, curP);
                    }
                    this.convergeParticles.geometry.attributes.position.needsUpdate = true;
                    this.convergeParticles.material.opacity = 1.0 - progress;

                    if (t >= 1.45) {
                        this.scene.remove(this.convergeParticles);
                        this.spawnFirework(0, -4, 0); 
                    }
                }

                // 🕒 1.5s - 3.0s 【黄金六芒星唤醒展开】
                if (t >= 1.5 && t < 3.0) {
                    document.getElementById('hud-title').textContent = "黄金法阵，破空唤醒...";
                    const progress = (t - 1.5) / 1.5;
                    const scale = this.easeOutBack(progress);
                    
                    this.magicCircle.scale.set(scale, 1, scale);
                    this.magicCircleMaterial.opacity = Math.min(1.0, progress * 1.5);
                    this.magicStarMaterial.opacity = Math.min(1.0, progress * 1.5);

                    this.magicCircle.children.forEach(child => {
                        if (child.isMesh) child.material.opacity = Math.min(1.0, progress * 1.5);
                    });
                }

                // 地表法阵自转
                if (t >= 1.5 && this.magicCircle) {
                    this.magicCircle.rotation.y += 0.012;
                }

                // 🕒 3.0s - 6.0s 【城堡惊艳破地拔起】
                if (t >= 3.0 && t < 6.0) {
                    document.getElementById('hud-title').textContent = "史诗皇家城堡，自虚空升起...";
                    const progress = (t - 3.0) / 2.0; 
                    if (progress >= 0 && progress <= 1.0) {
                        const ease = this.easeOutBack(progress);
                        this.castleGroup.position.y = -30 * (1 - ease); 
                        
                        this.castleGroup.traverse(node => {
                            if (node.isMesh && node.material) {
                                node.material.opacity = Math.min(1.0, progress * 1.8);
                            }
                        });
                    } else {
                        this.castleGroup.position.y = 0;
                    }
                }

                // 【核心突破：6秒升起完毕后，立即锁死白瓷/黄金的透明度，断绝深度排序混乱Bug，实现雕刻光影效果】
                if (t >= 5.9 && !this.solidStateLocked) {
                    this.solidStateLocked = true;
                    this.castleGroup.position.y = 0;
                    this.solidMeshes.forEach(mesh => {
                        mesh.material.transparent = false;
                        mesh.material.opacity = 1.0;
                        mesh.material.needsUpdate = true;
                    });
                }

                // 微风小旌旗波动摆动模拟
                if (this.flags.length > 0) {
                    this.flags.forEach((flag, index) => {
                        flag.rotation.x = Math.sin(now * 0.009 + index) * 0.18;
                        flag.rotation.y = Math.cos(now * 0.006 + index) * 0.12;
                    });
                }

                // 🕒 6.0s - 8.0s 【彩色窗棂炽烈点亮】
                if (t >= 6.0 && t < 8.0) {
                    document.getElementById('hud-title').textContent = "斑斓圣殿，彩虹窗棂炫然点亮...";
                    const progress = (t - 6.0) / 1.5; 
                    this.windowLights.forEach((win, index) => {
                        const delayOffset = (index / this.windowLights.length) * 0.8;
                        if (progress >= delayOffset) {
                            win.material.emissiveIntensity = THREE.MathUtils.lerp(0.05, 1.4, (progress - delayOffset) * 2.0);
                        }
                    });
                }

                // 🕒 8.0s - 10.5s 【漫天物理烟花华丽盛宴】
                if (t >= 8.0 && t < 10.5) {
                    document.getElementById('hud-title').textContent = "浪漫星原，物理烟花奢华绽放...";
                    
                    if (t >= 8.0 && t < 8.05 && !this.leftFireworkTriggered) {
                        this.leftFireworkTriggered = true;
                        this.spawnFirework(-13, 9, -2);
                    }

                    if (t >= 8.6 && t < 8.65 && !this.rightFireworkTriggered) {
                        this.rightFireworkTriggered = true;
                        this.spawnFirework(13, 9, -2);
                    }

                    if (t >= 9.2 && t < 9.25 && !this.centerFireworkTriggered) {
                        this.centerFireworkTriggered = true;
                        this.spawnFirework(0, 18, -4); 
                    }
                }

                // 🕒 10.5s - 12.0s 【全景完美消散谢幕】
                if (t >= 10.5) {
                    document.getElementById('hud-title').textContent = "星华散落，皇家盛宴缓缓落幕...";
                    const fade = (t - 10.5) / 1.5;

                    this.castleGroup.traverse(node => {
                        if (node.isMesh && node.material) {
                            node.material.transparent = true;
                            node.material.opacity = Math.max(0, 1.0 - fade);
                        }
                    });

                    if (this.magicCircleMaterial) {
                        this.magicCircleMaterial.opacity = Math.max(0, 1.0 - fade * 1.5);
                        this.magicStarMaterial.opacity = Math.max(0, 1.0 - fade * 1.5);
                    }
                }

                // 环境飘雪更新
                if (this.fallingStars) {
                    const positions = this.fallingStars.geometry.attributes.position.array;
                    for (let i = 1; i < positions.length; i += 3) {
                        positions[i] -= 0.14; 
                        if (positions[i] < -15) positions[i] = 30; 
                    }
                    this.fallingStars.geometry.attributes.position.needsUpdate = true;
                }
            }

            easeOutCubic(x) {
                return 1 - Math.pow(1 - x, 3);
            }

            easeOutBack(x) {
                const c1 = 1.70158;
                const c3 = c1 + 1;
                return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
            }

            // 电影质感高角度运镜
            autoRotateCamera() {
                if (!this.isPlaying) {
                    const speed = 0.0025;
                    const x = this.camera.position.x;
                    const z = this.camera.position.z;
                    this.camera.position.x = x * Math.cos(speed) - z * Math.sin(speed);
                    this.camera.position.z = x * Math.sin(speed) + z * Math.cos(speed);
                } else {
                    const t = this.timeline;
                    const aspect = window.innerWidth / window.innerHeight;
                    const baseZ = aspect < 1.0 ? 46 : 36; 

                    if (t > 0 && t < 3.0) {
                        // 开场仰视气旋
                        this.camera.position.lerp(new THREE.Vector3(0, 10, baseZ), 0.03);
                    } else if (t >= 3.0 && t < 8.0) {
                        // 随着城堡缓缓升起，镜头平移到侧前方 25 度高位角，极具立体美感
                        this.camera.position.lerp(new THREE.Vector3(7, 9, baseZ - 4), 0.015);
                    } else if (t >= 8.0) {
                        // 烟花绽放，大幅后撤展现壮丽天空
                        this.camera.position.lerp(new THREE.Vector3(-12, 14, baseZ + 4), 0.02);
                    }
                }
                // 镜头永远锁在城堡世界重心
                this.camera.lookAt(0, -1, 0); 
            }

            animate() {
                const now = performance.now();
                
                this.update(now);
                this.updateFireworks();
                this.autoRotateCamera();

                this.controls.update(); 
                this.renderer.render(this.scene, this.camera);

                requestAnimationFrame(() => this.animate());
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new Gift3DEngine();
        });
    </script>
</body>
