<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D梦幻城堡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 引入高雅的中英文字体组合 -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0a10;
            font-family: 'Noto Serif SC', 'Cinzel', serif;
            color: #e2e8f0;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 磨砂全息控制面板 */
        .hud-overlay {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: auto;
            background: rgba(15, 13, 22, 0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px rgba(212, 175, 55, 0.25) solid;
            border-radius: 30px;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.7), inset 0 0 15px rgba(212, 175, 55, 0.05);
            transition: all 0.3s ease;
        }

        .hud-overlay:hover {
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 15px 45px rgba(212, 175, 55, 0.15);
        }

        .gift-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .gift-icon {
            font-size: 24px;
            animation: bounce 2s infinite alternate;
        }

        .gift-text {
            display: flex;
            flex-direction: column;
        }

        .gift-title {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            font-size: 14px;
            color: #e5cf92;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .gift-status {
            font-size: 10px;
            color: rgba(226, 232, 240, 0.6);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* 重播控制 */
        .control-btn {
            background: rgba(212, 175, 55, 0.1);
            border: 1px rgba(212, 175, 55, 0.35) solid;
            color: #e5cf92;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
            letter-spacing: 1.5px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .control-btn:hover {
            background: rgba(212, 175, 55, 0.25);
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transform: translateY(-1px);
        }

        /* 引导遮罩 */
        .intro-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0a10;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .intro-screen.hide {
            opacity: 0;
            pointer-events: none;
        }

        .castle-logo {
            font-size: 72px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }

        .intro-title {
            font-family: 'Cinzel', serif;
            font-size: 26px;
            font-weight: 900;
            color: #e5cf92;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            margin-bottom: 8px;
            text-align: center;
        }

        .intro-subtitle {
            font-size: 12px;
            color: rgba(226, 232, 240, 0.55);
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 90%;
            line-height: 1.5;
        }

        .start-btn {
            background: linear-gradient(135deg, #e5cf92, #c5a059);
            border: none;
            color: #0d0520;
            padding: 14px 44px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 3px;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.25);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(3deg); }
        }
    </style>

    <!-- 导入 Three.js 及 OrbitControls 轨道控制器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <!-- 引导界面 -->
    <div class="intro-screen" id="intro-screen">
        <div class="castle-logo">🏰</div>
        <h1 class="intro-title">ROYAL EPIC CASTLE</h1>
        <p class="intro-subtitle">1:1 阿拉巴斯特象牙白瓷城堡 · 柔光氛围物理烟花</p>
        <button class="start-btn" id="start-btn">开启奢华 3D 星空</button>
    </div>

    <!-- 顶端悬浮 HUD -->
    <div class="hud-overlay">
        <div class="gift-info">
            <span class="gift-icon">🏰</span>
            <div class="gift-text">
                <span class="gift-title" id="hud-title">等待开启...</span>
                <span class="gift-status" id="hud-timer">0.0s / 12.0s</span>
            </div>
        </div>
        <button class="control-btn" id="replay-btn">重播特效</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // =========================================================================
        // 《3D 皇家梦幻城堡与物理烟花》- 莫兰迪柔光高雅复刻版
        // =========================================================================

        const PALETTE = {
            porcelain: 0xf5f2eb,       // 温润象牙白瓷（低反光度，高雅石料感）
            roofPorcelain: 0x8d93ab,   // 沉静蓝灰顶瓦（1:1 还原原图优雅柔和色调）
            gold: 0xd4af37,            // 高雅香槟金（低饱和度，拒绝俗气纯黄）
            bgTop: 0x0a090e,           // 极其深邃的静谧夜空
            bgBottom: 0x14121a,        // 柔和暗光地平线
            // 莫兰迪马卡龙柔和烟花配色（香槟金、柔金、淡紫、淡粉、银蓝）
            fireworks: [0xe5cf92, 0xf3abb6, 0xb9c0da, 0xd0bdf4, 0xaed9e5, 0xffe5d9]
        };

        class Gift3DEngine {
            constructor() {
                this.container = document.getElementById('canvas-container');
                
                this.timeline = 0;
                this.lastTime = performance.now();
                this.isPlaying = false;

                // 3D 场景与高精度雾化
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x0a090e, 0.015);

                this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.adjustCameraForViewport();

                // 启用高精度抗锯齿
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
                this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.setClearColor(PALETTE.bgTop, 1);
                this.container.appendChild(this.renderer.domElement);

                // 轨道阻尼
                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxPolarAngle = Math.PI / 2 - 0.06; 
                this.controls.minDistance = 15;
                this.controls.maxDistance = 120;
                this.controls.target.set(0, 0, 0);

                // 核心节点群组
                this.castleGroup = new THREE.Group();
                this.scene.add(this.castleGroup);

                this.magicCircle = null;
                this.windowLights = [];
                this.solidMeshes = []; 
                this.flags = []; 
                this.fireworks = []; 

                this.convergeParticles = null;
                this.fallingStars = null;

                // 生成极为柔和的水彩拼花玻璃贴图
                this.stainedGlassTexture = this.createStainedGlassTexture();

                this.setupLights();
                this.buildCastle();
                this.buildMagicCircle();
                this.buildFallingStars();
                this.bindEvents();

                window.onload = () => {
                    this.animate();
                };
            }

            // 绘制极具艺术美感的“莫兰迪水彩”拼花窗格（柔和晕染，丝毫不刺眼）
            createStainedGlassTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                
                // 莫兰迪水彩垂直渐变：琥珀柔黄 -> 浅茶粉 -> 浅紫罗兰 -> 淡银蓝
                const grad = ctx.createLinearGradient(0, 0, 0, 256);
                grad.addColorStop(0, '#fcebb6');
                grad.addColorStop(0.35, '#f3abb6');
                grad.addColorStop(0.7, '#d0bdf4');
                grad.addColorStop(1, '#aed9e5');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, 128, 256);

                // 画笔触感：极细的金色复古窗格条纹，高雅细腻
                ctx.strokeStyle = 'rgba(212, 175, 55, 0.25)'; 
                ctx.lineWidth = 3;
                for (let i = 0; i <= 128; i += 32) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 256); ctx.stroke();
                }
                for (let j = 0; j <= 256; j += 48) {
                    ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(128, j); ctx.stroke();
                }
                
                const texture = new THREE.CanvasTexture(canvas);
                return texture;
            }

            adjustCameraForViewport() {
                const aspect = window.innerWidth / window.innerHeight;
                if (aspect < 1.0) {
                    this.camera.position.set(0, 15, 45);
                } else {
                    this.camera.position.set(0, 11, 35);
                }
            }

            setupLights() {
                // 1. 全局柔和漫射环境光（微弱淡紫调，填充阴影，消除冷硬死黑）
                const ambientLight = new THREE.AmbientLight(0x1a1824, 2.5);
                this.scene.add(ambientLight);

                // 2. 物理半球光（Hemisphere Light）：模拟天空与地面的散射光，使白瓷材质自然呈现细腻的阴影色泽
                const hemiLight = new THREE.HemisphereLight(0xe2e6ff, 0x1d1929, 1.2);
                this.scene.add(hemiLight);

                // 3. 主摄影射灯（柔和日光白色，倾斜45度投射，塑造立体阴影，低对比度，拒绝洗白）
                this.dirLight = new THREE.DirectionalLight(0xfffcf5, 2.0);
                this.dirLight.position.set(18, 32, 20);
                this.dirLight.castShadow = true;
                this.dirLight.shadow.mapSize.width = 2048;
                this.dirLight.shadow.mapSize.height = 2048;
                this.dirLight.shadow.bias = -0.0003;
                this.dirLight.shadow.camera.near = 10;
                this.dirLight.shadow.camera.far = 100;
                const d = 15;
                this.dirLight.shadow.camera.left = -d;
                this.dirLight.shadow.camera.right = d;
                this.dirLight.shadow.camera.top = d;
                this.dirLight.shadow.camera.bottom = -d;
                this.scene.add(this.dirLight);

                // 4. 极弱的后方边缘柔色补光（温暖琥珀微金调，修饰模型立体侧边）
                this.fillLight = new THREE.DirectionalLight(0xfcebb6, 0.4);
                this.fillLight.position.set(-15, 8, -15);
                this.scene.add(this.fillLight);
            }

            // 绘制哥特尖拱（Gothic Arch）高雅数学曲线
            getGothicArchShape(w, h) {
                const shape = new THREE.Shape();
                const straightH = h - w / 2; 
                shape.moveTo(-w / 2, 0);
                shape.lineTo(-w / 2, straightH);
                shape.quadraticCurveTo(-w / 2, h, 0, h);
                shape.quadraticCurveTo(w / 2, h, w / 2, straightH);
                shape.lineTo(w / 2, 0);
                shape.closePath();
                return shape;
            }

            // === 1:1 殿堂级温润白瓷城堡雕刻 ===
            buildCastle() {
                // 珍珠象牙白瓷，极致哑光感（Roughness高达0.5），触感柔顺温润，无任何塑料反光
                const porcelainMaterial = new THREE.MeshStandardMaterial({
                    color: PALETTE.porcelain,
                    roughness: 0.5,
                    metalness: 0.05,
                    side: THREE.DoubleSide
                });

                // 沉静优雅的薰衣草蓝灰瓦片顶，温和高级
                const roofMaterial = new THREE.MeshStandardMaterial({
                    color: PALETTE.roofPorcelain,
                    roughness: 0.45,
                    metalness: 0.05,
                    side: THREE.DoubleSide
                });

                // 复古香槟金（低饱和度高反光，营造奢华细节）
                const goldMaterial = new THREE.MeshStandardMaterial({
                    color: PALETTE.gold,
                    roughness: 0.25,
                    metalness: 0.8
                });

                // 莫兰迪拼花玻璃材质（温和内敛自发光，低亮度，绝不刺眼）
                const glassMaterial = new THREE.MeshStandardMaterial({
                    color: 0xffffff,
                    map: this.stainedGlassTexture,
                    emissiveMap: this.stainedGlassTexture,
                    emissive: 0xffffff,
                    emissiveIntensity: 0.35, // 极低的温柔微光
                    roughness: 0.2,
                    metalness: 0.1,
                    transparent: true,
                    opacity: 0.9,
                    side: THREE.DoubleSide
                });

                // 浮雕窗户生成器
                const createGothicWindow = (x, y, z, rY, w, h, parent, isMain = false) => {
                    const winGroup = new THREE.Group();
                    winGroup.position.set(x, y, z);
                    winGroup.rotation.y = rY;

                    const shape = this.getGothicArchShape(w, h);
                    const glassGeo = new THREE.ShapeGeometry(shape);
                    const glassMesh = new THREE.Mesh(glassGeo, glassMaterial.clone());
                    glassMesh.position.set(0, 0, 0.02);
                    winGroup.add(glassMesh);
                    this.windowLights.push(glassMesh);

                    // 金色细腻框架
                    const extrudeSettings = { depth: 0.06, bevelEnabled: true, bevelSegments: 1, steps: 1, bevelSize: 0.01, bevelThickness: 0.01 };
                    const frameGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                    const frameMesh = new THREE.Mesh(frameGeo, goldMaterial);
                    frameMesh.position.set(0, 0, -0.03);
                    winGroup.add(frameMesh);
                    this.solidMeshes.push(frameMesh);

                    if (isMain) {
                        const pinGeo = new THREE.ConeGeometry(w/2 + 0.04, 0.4, 4);
                        const pin = new THREE.Mesh(pinGeo, goldMaterial);
                        pin.rotation.y = Math.PI / 4;
                        pin.position.y = h + 0.2;
                        winGroup.add(pin);
                        this.solidMeshes.push(pin);
                    }

                    parent.add(winGroup);
                };

                // 金色皇家十字导风叶与心形皇冠尖饰
                const createTopCrest = (x, y, z, parent) => {
                    const crestGroup = new THREE.Group();
                    crestGroup.position.set(x, y, z);

                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.8, 8), goldMaterial);
                    crestGroup.add(pole);

                    const crown = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.24, 0.2, 12), goldMaterial);
                    crown.position.y = 0.55;
                    crestGroup.add(crown);

                    const curve1 = new THREE.Mesh(new THREE.TorusGeometry(0.24, 0.03, 6, 16, Math.PI), goldMaterial);
                    curve1.position.y = 0.9;
                    const curve2 = new THREE.Mesh(new THREE.TorusGeometry(0.24, 0.03, 6, 16, Math.PI), goldMaterial);
                    curve2.rotation.y = Math.PI / 2;
                    curve2.position.y = 0.9;
                    crestGroup.add(curve1, curve2);

                    const star = new THREE.Mesh(new THREE.SphereGeometry(0.1, 10, 10), goldMaterial);
                    star.position.y = 1.3;
                    crestGroup.add(star);

                    parent.add(crestGroup);
                    this.solidMeshes.push(pole, crown, curve1, curve2, star);
                };

                // === 下移 pivot，确保居中 ===
                const rootPivot = new THREE.Group();
                rootPivot.position.y = -6.0; 
                this.castleGroup.add(rootPivot);

                // === A. 八角象牙白瓷阶梯底盘 ===
                const baseGroup = new THREE.Group();
                const base1 = new THREE.Mesh(new THREE.CylinderGeometry(9.4, 10.0, 1.3, 8), porcelainMaterial);
                base1.position.y = 0.65;
                baseGroup.add(base1);

                // 香槟金收缩包边（低调而贵气）
                const trim1 = new THREE.Mesh(new THREE.CylinderGeometry(9.5, 9.5, 0.12, 8), goldMaterial);
                trim1.position.y = 1.31;
                const base2 = new THREE.Mesh(new THREE.CylinderGeometry(8.2, 8.6, 0.7, 8), porcelainMaterial);
                base2.position.y = 1.65;
                baseGroup.add(trim1, base2);
                rootPivot.add(baseGroup);
                this.solidMeshes.push(base1, trim1, base2);

                // === B. 前置皇家白瓷大台阶（对称金色扶手饰） ===
                const stepsGroup = new THREE.Group();
                stepsGroup.position.set(0, 0.0, 8.2);

                const stepsCount = 6;
                for (let i = 0; i < stepsCount; i++) {
                    const stepW = 3.8 - i * 0.25;
                    const stepH = 0.2;
                    const stepD = 1.0 + i * 0.15;
                    const step = new THREE.Mesh(new THREE.BoxGeometry(stepW, stepH, stepD), porcelainMaterial);
                    step.position.set(0, stepH * i + 0.1, -i * 0.08);
                    stepsGroup.add(step);
                    this.solidMeshes.push(step);
                }

                // 阶梯两侧的圆柱球冠扶手（1:1完美写实还原）
                const railL = new THREE.Mesh(new THREE.BoxGeometry(0.28, 1.2, 1.7), porcelainMaterial);
                railL.position.set(-2.0, 0.6, -0.3);
                railL.rotation.x = -0.22;
                const ballL = new THREE.Mesh(new THREE.SphereGeometry(0.26, 16, 16), porcelainMaterial);
                ballL.position.set(-2.0, 0.38, 0.6);
                const goldBallL = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), goldMaterial);
                goldBallL.position.set(-2.0, 0.7, 0.6);

                const railR = new THREE.Mesh(new THREE.BoxGeometry(0.28, 1.2, 1.7), porcelainMaterial);
                railR.position.set(2.0, 0.6, -0.3);
                railR.rotation.x = -0.22;
                const ballR = new THREE.Mesh(new THREE.SphereGeometry(0.26, 16, 16), porcelainMaterial);
                ballR.position.set(2.0, 0.38, 0.6);
                const goldBallR = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), goldMaterial);
                goldBallR.position.set(2.0, 0.7, 0.6);

                stepsGroup.add(railL, ballL, goldBallL, railR, ballR, goldBallR);
                rootPivot.add(stepsGroup);
                this.solidMeshes.push(railL, ballL, goldBallL, railR, ballR, goldBallR);

                // === C. 核心大教堂主殿堂（Main Sanctuary Hall） ===
                const mainHallGroup = new THREE.Group();
                mainHallGroup.position.set(0, 2.0, 0);

                const hallWall = new THREE.Mesh(new THREE.BoxGeometry(6.8, 5.2, 7.6), porcelainMaterial);
                hallWall.position.y = 2.6;
                mainHallGroup.add(hallWall);
                this.solidMeshes.push(hallWall);

                // 殿侧的香槟金拱形柱肋，强化影子结构线
                for (let i = -3.0; i <= 3.0; i += 1.5) {
                    if (Math.abs(i) < 0.1) continue;
                    const ribL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 5.2, 0.35), goldMaterial);
                    ribL.position.set(-3.42, 2.6, i);
                    const ribR = new THREE.Mesh(new THREE.BoxGeometry(0.12, 5.2, 0.35), goldMaterial);
                    ribR.position.set(3.42, 2.6, i);
                    mainHallGroup.add(ribL, ribR);
                    this.solidMeshes.push(ribL, ribR);
                }

                // 经典的人字倾斜尖脊高瓦顶
                const roofShape = new THREE.Shape();
                roofShape.moveTo(-3.4, 0);
                roofShape.lineTo(0, 3.2);
                roofShape.lineTo(3.4, 0);
                roofShape.closePath();
                const roofExtSettings = { depth: 7.8, bevelEnabled: false };
                const roofGeom = new THREE.ExtrudeGeometry(roofShape, roofExtSettings);
                const roofMesh = new THREE.Mesh(roofGeom, roofMaterial);
                roofMesh.position.set(0, 5.2, -3.9);
                mainHallGroup.add(roofMesh);
                this.solidMeshes.push(roofMesh);

                rootPivot.add(mainHallGroup);

                // === D. 殿前主拱牌门与圣光玫瑰窗（Cathedral Portal & Rose Window） ===
                const portalGroup = new THREE.Group();
                portalGroup.position.set(0, 2.0, 6.2); 

                const portalBody = new THREE.Mesh(new THREE.BoxGeometry(3.6, 4.0, 1.0), porcelainMaterial);
                portalBody.position.y = 2.0;
                portalGroup.add(portalBody);
                this.solidMeshes.push(portalBody);

                // 层层缩进的哥特尖门套圈（极富深度细节）
                for (let i = 0; i < 3; i++) {
                    const pW = 1.5 - i * 0.22;
                    const pH = 2.2 - i * 0.18;
                    const archShape = this.getGothicArchShape(pW, pH);
                    const extrudeOpt = { depth: 0.15, bevelEnabled: true, bevelSize: 0.015, bevelThickness: 0.015, steps: 1 };
                    const archGeo = new THREE.ExtrudeGeometry(archShape, extrudeOpt);
                    const archMesh = new THREE.Mesh(archGeo, i === 0 ? goldMaterial : porcelainMaterial);
                    archMesh.position.set(0, 0, 0.5 - i * 0.15);
                    portalGroup.add(archMesh);
                    this.solidMeshes.push(archMesh);
                }

                // 主拱彩色窗门
                const mainDoorShape = this.getGothicArchShape(1.0, 1.8);
                const mainDoorGeo = new THREE.ShapeGeometry(mainDoorShape);
                const mainDoorMesh = new THREE.Mesh(mainDoorGeo, glassMaterial);
                mainDoorMesh.position.set(0, 0, 0.08);
                portalGroup.add(mainDoorMesh);
                this.windowLights.push(mainDoorMesh);

                // 顶端勾金边的白瓷三角山墙
                const triangShape = new THREE.Shape();
                triangShape.moveTo(-1.8, 0);
                triangShape.lineTo(0, 2.2);
                triangShape.lineTo(1.8, 0);
                triangShape.closePath();
                const triangGeo = new THREE.ExtrudeGeometry(triangShape, { depth: 0.15, bevelEnabled: false });
                const triangMesh = new THREE.Mesh(triangGeo, porcelainMaterial);
                triangMesh.position.set(0, 4.0, -0.35);
                portalGroup.add(triangMesh);
                this.solidMeshes.push(triangMesh);

                const gableGoldL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.4, 0.18), goldMaterial);
                gableGoldL.position.set(-0.9, 5.1, -0.25);
                gableGoldL.rotation.z = 0.65;
                const gableGoldR = new THREE.Mesh(new THREE.BoxGeometry(0.08, 2.4, 0.18), goldMaterial);
                gableGoldR.position.set(0.9, 5.1, -0.25);
                gableGoldR.rotation.z = -0.65;
                portalGroup.add(gableGoldL, gableGoldR);
                this.solidMeshes.push(gableGoldL, gableGoldR);

                // 玫瑰圆窗（温柔微光发光）
                const roseGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.12, 24);
                const roseMesh = new THREE.Mesh(roseGeo, glassMaterial);
                roseMesh.rotation.x = Math.PI / 2;
                roseMesh.position.set(0, 4.8, -0.15);
                portalGroup.add(roseMesh);
                this.windowLights.push(roseMesh);

                const roseBorder = new THREE.Mesh(new THREE.TorusGeometry(0.57, 0.04, 8, 24), goldMaterial);
                roseBorder.position.set(0, 4.8, -0.05);
                portalGroup.add(roseBorder);
                this.solidMeshes.push(roseBorder);

                rootPivot.add(portalGroup);

                // === E. 前置对称双矮哨塔（Front Guard Towers） ===
                const buildFrontTurret = (xSide) => {
                    const turret = new THREE.Group();
                    turret.position.set(xSide * 4.2, 2.0, 4.8);

                    const t1 = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.98, 3.8, 12), porcelainMaterial);
                    t1.position.y = 1.9;
                    turret.add(t1);

                    const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.98, 0.98, 0.25, 12), goldMaterial);
                    rim.position.y = 3.8;
                    turret.add(rim);

                    const sp = new THREE.Mesh(new THREE.ConeGeometry(0.98, 2.8, 12), roofMaterial);
                    sp.position.y = 5.2;
                    turret.add(sp);

                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.8, 8), goldMaterial);
                    pole.position.y = 6.8;
                    // 马卡龙色调柔和小旗
                    const fl = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.45, 4), new THREE.MeshStandardMaterial({ color: xSide < 0 ? 0xf3abb6 : 0xaed9e5, roughness: 0.5 }));
                    fl.rotation.z = Math.PI / 2;
                    fl.position.set(0.18, 7.0, 0);
                    turret.add(pole, fl);
                    this.flags.push(fl);

                    createGothicWindow(xSide * 0.8, 2.0, 0, xSide * Math.PI / 2, 0.35, 0.75, turret);

                    rootPivot.add(turret);
                    this.solidMeshes.push(t1, rim, sp, pole);
                };
                buildFrontTurret(-1);
                buildFrontTurret(1);

                // === F. 中部对称多阶拱耳塔（Middle Flank Turrets） ===
                const buildMiddleSpire = (xSide) => {
                    const spire = new THREE.Group();
                    spire.position.set(xSide * 4.4, 2.0, -0.4);

                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.9, 1.08, 5.2, 12), porcelainMaterial);
                    body.position.y = 2.6;
                    spire.add(body);

                    const trim = new THREE.Mesh(new THREE.CylinderGeometry(0.98, 0.98, 0.12, 12), goldMaterial);
                    trim.position.y = 5.2;
                    spire.add(trim);

                    const balcony = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 0.4, 12), porcelainMaterial);
                    balcony.position.y = 5.46;
                    const balu = new THREE.Mesh(new THREE.CylinderGeometry(1.22, 1.22, 0.25, 12, 1, true), goldMaterial);
                    balu.position.y = 5.78;
                    spire.add(balcony, balu);

                    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.75, 0.75, 3.5, 12), porcelainMaterial);
                    upper.position.y = 7.4;
                    spire.add(upper);

                    const roof = new THREE.Mesh(new THREE.ConeGeometry(0.8, 3.0, 12), roofMaterial);
                    roof.position.y = 10.5;
                    spire.add(roof);

                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.7, 8), goldMaterial);
                    pole.position.y = 12.2;
                    const fl = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.4, 4), new THREE.MeshStandardMaterial({ color: xSide < 0 ? 0xe5cf92 : 0xd0bdf4, roughness: 0.5 }));
                    fl.rotation.z = Math.PI / 2;
                    fl.position.set(0.15, 12.4, 0);
                    spire.add(pole, fl);
                    this.flags.push(fl);

                    createGothicWindow(0, 7.5, 0.77, 0, 0.38, 0.85, spire, true);

                    rootPivot.add(spire);
                    this.solidMeshes.push(body, trim, balcony, balu, upper, roof, pole);
                };
                buildMiddleSpire(-1);
                buildMiddleSpire(1);

                // === G. 100%还原后置双子至尊圣殿高塔（Double Master Spires） ===
                const buildGrandMasterSpire = (xSide) => {
                    const master = new THREE.Group();
                    master.position.set(xSide * 1.4, 2.0, -4.0);

                    // 八角形大墙基柱（柔和漫反射）
                    const f1 = new THREE.Mesh(new THREE.CylinderGeometry(1.1, 1.28, 7.2, 8), porcelainMaterial);
                    f1.position.y = 3.6;
                    master.add(f1);

                    // 八角棱上的垂直立挺凸出肋条（极高立体阴影细节）
                    for (let i = 0; i < 8; i++) {
                        const angle = (i * Math.PI) / 4;
                        const but = new THREE.Mesh(new THREE.BoxGeometry(0.1, 7.2, 0.22), goldMaterial);
                        but.position.set(Math.cos(angle) * 1.18, 3.6, Math.sin(angle) * 1.18);
                        but.rotation.y = -angle;
                        master.add(but);
                        this.solidMeshes.push(but);
                    }

                    const f1Trim = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.2, 2.1), goldMaterial);
                    f1Trim.position.y = 7.3;
                    master.add(f1Trim);

                    // 第二层：金色镂空透光长廊 (Cathedral Gallery)
                    const f2 = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 4.0, 8), porcelainMaterial);
                    f2.position.y = 9.4;
                    master.add(f2);

                    for (let i = 0; i < 8; i++) {
                        const angle = (i * Math.PI) / 4;
                        const col = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 4.0, 8), goldMaterial);
                        col.position.set(Math.cos(angle) * 0.9, 9.4, Math.sin(angle) * 0.9);
                        master.add(col);
                        this.solidMeshes.push(col);
                    }

                    // 内部水彩玻璃内透光（极其柔和）
                    const coreGlass = new THREE.Mesh(new THREE.CylinderGeometry(0.68, 0.68, 3.7, 8), glassMaterial);
                    coreGlass.position.y = 9.4;
                    master.add(coreGlass);
                    this.windowLights.push(coreGlass);

                    // 第三层：白瓷过渡级
                    const f3 = new THREE.Mesh(new THREE.CylinderGeometry(0.64, 0.64, 2.6, 12), porcelainMaterial);
                    f3.position.y = 12.7;
                    master.add(f3);

                    // 至极挺拔的锥形高尖顶瓦（Periwinkle 优雅蓝灰）
                    const roof = new THREE.Mesh(new THREE.ConeGeometry(0.68, 5.2, 12), roofMaterial);
                    roof.position.y = 16.6;
                    master.add(roof);

                    // 瓦缝勾勒的香槟金线条细节
                    for (let i = 0; i < 6; i++) {
                        const angle = (i * Math.PI) / 3;
                        const rib = new THREE.Mesh(new THREE.BoxGeometry(0.03, 5.2, 0.05), goldMaterial);
                        rib.position.set(Math.cos(angle) * 0.32, 16.6, Math.sin(angle) * 0.32);
                        rib.rotation.y = -angle;
                        rib.rotation.z = -xSide * 0.05; 
                        master.add(rib);
                        this.solidMeshes.push(rib);
                    }

                    // 金色皇家十字冠饰与叶片风向标
                    createTopCrest(0, 19.1, 0, master);

                    createGothicWindow(0, 12.7, 0.66, 0, 0.3, 0.7, master, true);

                    rootPivot.add(master);
                    this.solidMeshes.push(f1, f1Trim, f2, f3, roof);
                };
                buildGrandMasterSpire(-1);
                buildGrandMasterSpire(1);

                // === H. 后翼小扶塔与倾斜飞扶壁支架（Rear Small Turrets & Flying Buttresses） ===
                const buildRearSmallTurret = (xSide) => {
                    const small = new THREE.Group();
                    small.position.set(xSide * 4.6, 2.0, -4.8);

                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.64, 7.6, 10), porcelainMaterial);
                    body.position.y = 3.8;
                    small.add(body);

                    const roof = new THREE.Mesh(new THREE.ConeGeometry(0.64, 2.6, 10), roofMaterial);
                    roof.position.y = 8.9;
                    small.add(roof);

                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.65, 8), goldMaterial);
                    pole.position.y = 10.2;
                    const fl = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.38, 4), new THREE.MeshStandardMaterial({ color: 0xf3abb6, roughness: 0.5 }));
                    fl.rotation.z = Math.PI / 2;
                    fl.position.set(0.14, 10.4, 0);
                    small.add(pole, fl);
                    this.flags.push(fl);

                    rootPivot.add(small);
                    this.solidMeshes.push(body, roof, pole);

                    // 1:1 倾斜拱圈形飞扶壁（100%还原后方宏大跨越连廊）
                    const bridge = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.24, 0.4), porcelainMaterial);
                    bridge.position.set(xSide * 3.0, 7.5, -4.3);
                    bridge.rotation.z = -xSide * 0.28; 
                    const bridgeTrim = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.06, 0.44), goldMaterial);
                    bridgeTrim.position.set(xSide * 3.0, 7.65, -4.3);
                    bridgeTrim.rotation.z = -xSide * 0.28;
                    rootPivot.add(bridge, bridgeTrim);
                    this.solidMeshes.push(bridge, bridgeTrim);
                };
                buildRearSmallTurret(-1);
                buildRearSmallTurret(1);

                // 投影阴影设置
                this.castleGroup.traverse(node => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
            }

            // --- 3D 黄金魔法六芒星法阵 ---
            buildMagicCircle() {
                const circleGroup = new THREE.Group();
                circleGroup.position.set(0, -6.01, 0);

                const ringGeoOuter = new THREE.RingGeometry(8.6, 8.8, 64);
                const ringGeoInner = new THREE.RingGeometry(7.6, 7.7, 64);
                const lineMat = new THREE.MeshBasicMaterial({
                    color: PALETTE.gold,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0
                });

                const ringOuter = new THREE.Mesh(ringGeoOuter, lineMat);
                ringOuter.rotation.x = Math.PI / 2;
                const ringInner = new THREE.Mesh(ringGeoInner, lineMat);
                ringInner.rotation.x = Math.PI / 2;

                circleGroup.add(ringOuter, ringInner);

                const starPoints = [];
                for (let i = 0; i < 6; i++) {
                    const angle = (i * Math.PI) / 3;
                    starPoints.push(new THREE.Vector3(Math.cos(angle) * 7.7, 0, Math.sin(angle) * 7.7));
                }

                const lineGeom1 = new THREE.BufferGeometry().setFromPoints([
                    starPoints[0], starPoints[2], starPoints[4], starPoints[0]
                ]);
                const lineGeom2 = new THREE.BufferGeometry().setFromPoints([
                    starPoints[1], starPoints[3], starPoints[5], starPoints[1]
                ]);

                const starLine1 = new THREE.Line(lineGeom1, new THREE.LineBasicMaterial({
                    color: PALETTE.gold,
                    transparent: true,
                    opacity: 0
                }));
                const starLine2 = new THREE.Line(lineGeom2, new THREE.LineBasicMaterial({
                    color: PALETTE.gold,
                    transparent: true,
                    opacity: 0
                }));

                circleGroup.add(starLine1, starLine2);

                for (let i = 0; i < 6; i++) {
                    const sphereGeo = new THREE.SphereGeometry(0.2, 16, 16);
                    const sphereMat = new THREE.MeshBasicMaterial({
                        color: 0xfffcf5,
                        transparent: true,
                        opacity: 0
                    });
                    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                    sphere.position.copy(starPoints[i]);
                    circleGroup.add(sphere);
                }

                this.scene.add(circleGroup);
                this.magicCircle = circleGroup;
                this.magicCircleMaterial = lineMat;
                this.magicStarMaterial = starLine1.material;
            }

            // --- 飘落环境微金微光星尘 ---
            buildFallingStars() {
                const count = 150;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                
                for (let i = 0; i < count * 3; i += 3) {
                    positions[i] = (Math.random() - 0.5) * 60;
                    positions[i+1] = Math.random() * 40;
                    positions[i+2] = (Math.random() - 0.5) * 60;
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.12,
                    color: 0xfcebb6, // 温柔的暖白微黄
                    transparent: true,
                    opacity: 0.4,
                    blending: THREE.AdditiveBlending
                });

                this.fallingStars = new THREE.Points(geometry, material);
                this.scene.add(this.fallingStars);
            }

            bindEvents() {
                window.addEventListener('resize', () => {
                    this.adjustCameraForViewport();
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                document.getElementById('start-btn').addEventListener('click', () => {
                    document.getElementById('intro-screen').classList.add('hide');
                    this.startEffect();
                });

                document.getElementById('replay-btn').addEventListener('click', () => {
                    this.startEffect();
                });
            }

            startEffect() {
                this.timeline = 0;
                this.lastTime = performance.now();
                this.isPlaying = true;

                // 初始状态：城堡深埋于地下 Y = -30
                this.castleGroup.position.y = -30; 
                this.castleGroup.traverse(node => {
                    if (node.isMesh && node.material) {
                        node.material.transparent = true;
                        node.material.opacity = 0;
                    }
                });

                // 重置窗户温柔的微光
                this.windowLights.forEach(win => {
                    win.material.emissiveIntensity = 0.05;
                });

                this.initConvergeParticles();
                this.fireworks.forEach(f => this.scene.remove(f.points));
                this.fireworks = [];

                this.leftFireworkTriggered = false;
                this.rightFireworkTriggered = false;
                this.centerFireworkTriggered = false;
                this.solidStateLocked = false;
            }

            // 金光微粒子气旋汇聚
            initConvergeParticles() {
                if (this.convergeParticles) this.scene.remove(this.convergeParticles);

                const count = 350;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                this.convergeData = [];

                const targetY = -4.0; 
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 22 + Math.random() * 12;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    const y = (Math.random() - 0.5) * 15 + 8;

                    positions[i*3] = x;
                    positions[i*3+1] = y;
                    positions[i*3+2] = z;

                    this.convergeData.push({
                        startX: x, startY: y, startZ: z,
                        targetX: 0, targetY: targetY, targetZ: 0,
                        speed: 0.6 + Math.random() * 0.7
                    });
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.3,
                    color: PALETTE.gold,
                    transparent: true,
                    opacity: 1.0,
                    blending: THREE.AdditiveBlending
                });

                this.convergeParticles = new THREE.Points(geometry, material);
                this.scene.add(this.convergeParticles);
            }

            // 三维莫兰迪柔色物理烟花
            spawnFirework(x, y, z) {
                const count = 220; 
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const velocities = [];

                // 柔色烟花颜色
                const color = PALETTE.fireworks[Math.floor(Math.random() * PALETTE.fireworks.length)];

                for (let i = 0; i < count; i++) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    const speed = 1.8 + Math.random() * 7.2; 

                    const vx = Math.sin(phi) * Math.cos(theta) * speed;
                    const vy = Math.sin(phi) * Math.sin(theta) * speed;
                    const vz = Math.cos(phi) * speed;

                    positions[i*3] = x;
                    positions[i*3+1] = y;
                    positions[i*3+2] = z;

                    velocities.push(new THREE.Vector3(vx, vy, vz));
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.28,
                    color: color,
                    transparent: true,
                    opacity: 0.9,
                    blending: THREE.AdditiveBlending
                });

                const points = new THREE.Points(geometry, material);
                this.scene.add(points);

                this.fireworks.push({
                    points: points,
                    velocities: velocities,
                    opacity: 0.9,
                    life: 1.0,
                    decay: 0.013 + Math.random() * 0.007 
                });
            }

            updateFireworks() {
                for (let f = this.fireworks.length - 1; f >= 0; f--) {
                    const fw = this.fireworks[f];
                    const positions = fw.points.geometry.attributes.position.array;
                    fw.life -= fw.decay;

                    for (let i = 0; i < fw.velocities.length; i++) {
                        const vel = fw.velocities[i];
                        
                        vel.multiplyScalar(0.96); // 阻力
                        vel.y -= 0.11;            // 落体

                        positions[i*3] += vel.x * 0.05;
                        positions[i*3+1] += vel.y * 0.05;
                        positions[i*3+2] += vel.z * 0.05;
                    }

                    fw.points.geometry.attributes.position.needsUpdate = true;
                    fw.points.material.opacity = fw.life;

                    if (fw.life <= 0) {
                        this.scene.remove(fw.points);
                        this.fireworks.splice(f, 1);
                    }
                }
            }

            // 核心动画状态机控制循环
            update(now) {
                if (!this.isPlaying) return;

                const dt = (now - this.lastTime) / 1000;
                this.lastTime = now;
                this.timeline += dt;

                const t = this.timeline;

                if (t >= 12.0) {
                    this.timeline = 12.0;
                    this.isPlaying = false;
                    document.getElementById('hud-title').textContent = "温润谢幕";
                    document.getElementById('hud-timer').textContent = "12.0s / 12.0s";
                    return;
                }

                document.getElementById('hud-timer').textContent = `${t.toFixed(1)}s / 12.0s`;

                // 🕒 0.0s - 1.5s 【温润金尘汇聚】
                if (t < 1.5) {
                    document.getElementById('hud-title').textContent = "皇家金尘，优雅汇聚中...";
                    const progress = t / 1.5;
                    const positions = this.convergeParticles.geometry.attributes.position.array;

                    for (let i = 0; i < this.convergeData.length; i++) {
                        const d = this.convergeData[i];
                        const curP = this.easeOutCubic(progress);
                        positions[i*3] = THREE.MathUtils.lerp(d.startX, d.targetX, curP);
                        positions[i*3+1] = THREE.MathUtils.lerp(d.startY, d.targetY, curP);
                        positions[i*3+2] = THREE.MathUtils.lerp(d.startZ, d.targetZ, curP);
                    }
                    this.convergeParticles.geometry.attributes.position.needsUpdate = true;
                    this.convergeParticles.material.opacity = 1.0 - progress;

                    if (t >= 1.45) {
                        this.scene.remove(this.convergeParticles);
                        this.spawnFirework(0, -4, 0); 
                    }
                }

                // 🕒 1.5s - 3.0s 【黄金法阵唤醒】
                if (t >= 1.5 && t < 3.0) {
                    document.getElementById('hud-title').textContent = "高贵法阵，破空绽放...";
                    const progress = (t - 1.5) / 1.5;
                    const scale = this.easeOutBack(progress);
                    
                    this.magicCircle.scale.set(scale, 1, scale);
                    this.magicCircleMaterial.opacity = Math.min(1.0, progress * 1.5);
                    this.magicStarMaterial.opacity = Math.min(1.0, progress * 1.5);

                    this.magicCircle.children.forEach(child => {
                        if (child.isMesh) child.material.opacity = Math.min(1.0, progress * 1.5);
                    });
                }

                // 法阵匀速缓慢自转
                if (t >= 1.5 && this.magicCircle) {
                    this.magicCircle.rotation.y += 0.009;
                }

                // 🕒 3.0s - 6.0s 【白瓷古堡缓缓浮起】
                if (t >= 3.0 && t < 6.0) {
                    document.getElementById('hud-title').textContent = "白瓷圣殿，静谧浮起...";
                    const progress = (t - 3.0) / 2.0; 
                    if (progress >= 0 && progress <= 1.0) {
                        const ease = this.easeOutBack(progress);
                        this.castleGroup.position.y = -30 * (1 - ease); 
                        
                        this.castleGroup.traverse(node => {
                            if (node.isMesh && node.material) {
                                node.material.opacity = Math.min(1.0, progress * 1.8);
                            }
                        });
                    } else {
                        this.castleGroup.position.y = 0;
                    }
                }

                // 【物理阻断：升起完毕，立即锁死白瓷与黄金的100%实体不透明度，消除深度排序穿透错误，实现最美的石雕光影转折】
                if (t >= 5.9 && !this.solidStateLocked) {
                    this.solidStateLocked = true;
                    this.castleGroup.position.y = 0;
                    this.solidMeshes.forEach(mesh => {
                        mesh.material.transparent = false;
                        mesh.material.opacity = 1.0;
                        mesh.material.needsUpdate = true;
                    });
                }

                // 旗帜轻柔拂动模拟
                if (this.flags.length > 0) {
                    this.flags.forEach((flag, index) => {
                        flag.rotation.x = Math.sin(now * 0.007 + index) * 0.15;
                        flag.rotation.y = Math.cos(now * 0.005 + index) * 0.1;
                    });
                }

                // 🕒 6.0s - 8.0s 【柔和内敛彩虹窗格柔美亮起】
                if (t >= 6.0 && t < 8.0) {
                    document.getElementById('hud-title').textContent = "温润微光，彩绘窗棂温柔点亮...";
                    const progress = (t - 6.0) / 1.5; 
                    this.windowLights.forEach((win, index) => {
                        const delayOffset = (index / this.windowLights.length) * 0.8;
                        if (progress >= delayOffset) {
                            // 自发光升华（最高0.65，极为温柔，毫无 glare 刺眼感）
                            win.material.emissiveIntensity = THREE.MathUtils.lerp(0.05, 0.65, (progress - delayOffset) * 2.0);
                        }
                    });
                }

                // 🕒 8.0s - 10.5s 【漫天香槟莫兰迪物理烟花】
                if (t >= 8.0 && t < 10.5) {
                    document.getElementById('hud-title').textContent = "浪漫星空，漫天柔色物理烟花...";
                    
                    if (t >= 8.0 && t < 8.05 && !this.leftFireworkTriggered) {
                        this.leftFireworkTriggered = true;
                        this.spawnFirework(-13, 8, -2);
                    }

                    if (t >= 8.6 && t < 8.65 && !this.rightFireworkTriggered) {
                        this.rightFireworkTriggered = true;
                        this.spawnFirework(13, 8, -2);
                    }

                    if (t >= 9.2 && t < 9.25 && !this.centerFireworkTriggered) {
                        this.centerFireworkTriggered = true;
                        this.spawnFirework(0, 16, -3); 
                    }
                }

                // 🕒 10.5s - 12.0s 【全景完美优雅谢幕】
                if (t >= 10.5) {
                    document.getElementById('hud-title').textContent = "流光渐敛，白瓷盛宴缓缓落幕...";
                    const fade = (t - 10.5) / 1.5;

                    this.castleGroup.traverse(node => {
                        if (node.isMesh && node.material) {
                            node.material.transparent = true;
                            node.material.opacity = Math.max(0, 1.0 - fade);
                        }
                    });

                    if (this.magicCircleMaterial) {
                        this.magicCircleMaterial.opacity = Math.max(0, 1.0 - fade * 1.5);
                        this.magicStarMaterial.opacity = Math.max(0, 1.0 - fade * 1.5);
                    }
                }

                // 星尘飘落
                if (this.fallingStars) {
                    const positions = this.fallingStars.geometry.attributes.position.array;
                    for (let i = 1; i < positions.length; i += 3) {
                        positions[i] -= 0.1; 
                        if (positions[i] < -15) positions[i] = 30; 
                    }
                    this.fallingStars.geometry.attributes.position.needsUpdate = true;
                }
            }

            easeOutCubic(x) {
                return 1 - Math.pow(1 - x, 3);
            }

            easeOutBack(x) {
                const c1 = 1.70158;
                const c3 = c1 + 1;
                return 1 + c3 * Math.pow(x - 1, 3) + c1 * Math.pow(x - 1, 2);
            }

            // 高雅慢速多维电影级运镜
            autoRotateCamera() {
                if (!this.isPlaying) {
                    const speed = 0.0018; // 极慢的匀速盘旋，极度解压舒缓
                    const x = this.camera.position.x;
                    const z = this.camera.position.z;
                    this.camera.position.x = x * Math.cos(speed) - z * Math.sin(speed);
                    this.camera.position.z = x * Math.sin(speed) + z * Math.cos(speed);
                } else {
                    const t = this.timeline;
                    const aspect = window.innerWidth / window.innerHeight;
                    const baseZ = aspect < 1.0 ? 44 : 34; 

                    if (t > 0 && t < 3.0) {
                        this.camera.position.lerp(new THREE.Vector3(0, 8, baseZ), 0.025);
                    } else if (t >= 3.0 && t < 8.0) {
                        // 升起时，镜头缓缓盘旋并侧偏，把象牙白瓷侧面优雅的微明暗交界线凸显出来
                        this.camera.position.lerp(new THREE.Vector3(6, 8, baseZ - 4), 0.012);
                    } else if (t >= 8.0) {
                        // 烟花表演，稍微后退拉开宏观柔美的距离
                        this.camera.position.lerp(new THREE.Vector3(-10, 12, baseZ + 3), 0.015);
                    }
                }
                this.camera.lookAt(0, -1, 0); 
            }

            animate() {
                const now = performance.now();
                
                this.update(now);
                this.updateFireworks();
                this.autoRotateCamera();

                this.controls.update(); 
                this.renderer.render(this.scene, this.camera);

                requestAnimationFrame(() => this.animate());
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            new Gift3DEngine();
        });
    </script>
</body>
