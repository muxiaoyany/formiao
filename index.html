<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心动信号 - 喵喵收集器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 禁止移动端长按弹出菜单和选择文本 */
        * {
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #FFE4E6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        /* 打字机光标效果 */
        .cursor-blink::after {
            content: '|';
            animation: blink 1s infinite;
            color: #D63384;
        }
        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
        /* 旋转的毛线球和小鱼干 */
        .item-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(15deg); }
        }
    </style>
</head>
<body class="relative w-screen h-screen overflow-hidden text-rose-900 flex flex-col md:flex-row">

    <!-- 左侧：治愈交互与设置面板 -->
    <aside class="w-full md:w-80 border-b md:border-b-0 md:border-r border-rose-200/60 bg-white/80 backdrop-blur-md flex flex-col shrink-0 z-10 p-4 justify-between h-[30%] md:h-full shadow-lg">
        <div class="space-y-4">
            <!-- 头部标识 -->
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-tr from-pink-400 to-rose-400 p-2 rounded-2xl shadow-md shadow-rose-300 animate-pulse">
                    <i data-lucide="cat" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold tracking-wider text-rose-700 flex items-center gap-1">喵喵信号 <span class="text-xs font-normal text-rose-400">Meow!</span></h1>
                    <p class="text-[10px] text-rose-400">治愈系猫咪心动收集器</p>
                </div>
            </div>

            <!-- 自定义文案配置 -->
            <div class="hidden md:block space-y-3 pt-4 border-t border-rose-100">
                <h3 class="text-xs font-semibold text-rose-600 flex items-center space-x-1.5">
                    <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                    <span>自定义喵呜告白词</span>
                </h3>
                
                <!-- 52只告白词 -->
                <div class="space-y-1">
                    <label class="text-[10px] text-rose-400 uppercase tracking-wider">喵呜达成 (52只) 告白词</label>
                    <textarea id="msg52" rows="2" class="w-full bg-rose-50/60 border border-rose-200 text-rose-800 rounded-xl p-2 text-xs focus:outline-none focus:border-pink-400 transition resize-none leading-relaxed" placeholder="输入告白文案...">喵喵~ 我喜欢你呀，遇见你就是心动的开始 😽🐾</textarea>
                </div>

                <!-- 1314只告白词 -->
                <div class="space-y-1">
                    <label class="text-[10px] text-rose-400 uppercase tracking-wider">终极喵呜 (1314只) 告白词</label>
                    <textarea id="msg1314" rows="3" class="w-full bg-rose-50/60 border border-rose-200 text-rose-800 rounded-xl p-2 text-xs focus:outline-none focus:border-pink-400 transition resize-none leading-relaxed" placeholder="输入告白文案...">🐱 喵喵喵 🐱
遇见你之后，我只想做你的小猫咪。每天蹭蹭你，喵喵叫，永远赖在你身边 💗</textarea>
                </div>

                <!-- 互动说明 -->
                <div class="bg-rose-50 border border-rose-100 p-3 rounded-xl space-y-1.5 text-[11px] text-rose-600 leading-relaxed">
                    <p class="font-medium text-rose-700">🐾 喵咪互动指南：</p>
                    <p>• 单击任意位置：掉落1只可爱小喵喵与粉红猫爪</p>
                    <p>• 双击屏幕：召唤3只喵喵 + "喵～" 趣味字气泡</p>
                    <p>• 长按屏幕：触发壮观的喵喵雨下落特效</p>
                    <p>• 滑动拖拽：在轨迹上印出一串可爱的粉红小肉垫</p>
                </div>
            </div>
        </div>

        <!-- 底栏：音效控制与状态 -->
        <div class="flex items-center justify-between border-t border-rose-100 pt-3 text-[11px]">
            <div class="flex items-center space-x-2">
                <button id="toggleAudio" class="flex items-center space-x-1 px-2.5 py-1.5 bg-rose-100 hover:bg-rose-200/60 border border-rose-200 text-rose-600 rounded-xl transition">
                    <i data-lucide="volume-2" id="audioIcon" class="w-3.5 h-3.5"></i>
                    <span id="audioStatus">喵呜音效：开启</span>
                </button>
            </div>
            <button id="resetProgress" class="text-rose-400 hover:text-rose-600 transition flex items-center space-x-1 py-1">
                <i data-lucide="rotate-ccw" class="w-3 h-3"></i>
                <span>重置喵呜</span>
            </button>
        </div>
    </aside>

    <!-- 右侧：Canvas 浪漫交互区域 -->
    <main class="flex-1 h-[70%] md:h-full relative overflow-hidden bg-gradient-to-b from-[#FFF0F2] to-[#FFE4E6]">
        <!-- 顶部HUD面板：收集进度 -->
        <div class="absolute top-4 left-4 right-4 flex items-center justify-between pointer-events-none z-10">
            <!-- 计数器 -->
            <div class="bg-white/90 backdrop-blur-md border border-rose-200 rounded-full px-4 py-2 flex items-center space-x-3 shadow-md">
                <div class="flex items-center space-x-1.5">
                    <span class="text-rose-500 animate-bounce text-base">🐱</span>
                    <span class="text-xs font-bold text-rose-600 tracking-wider">喵喵能量:</span>
                </div>
                <div class="text-sm font-mono font-black text-rose-800 flex items-baseline space-x-1">
                    <span id="currentHearts" class="text-pink-600 text-lg">0</span>
                    <span class="text-[10px] text-rose-300">/</span>
                    <span id="targetHearts" class="text-rose-400">52</span>
                </div>
            </div>

            <!-- 状态提示 -->
            <div id="hintBubble" class="bg-white/95 backdrop-blur-md border border-rose-200 rounded-full px-4 py-2 text-[11px] text-pink-600 font-medium shadow-sm animate-bounce">
                点击屏幕，唤醒可爱猫咪 ✨
            </div>
        </div>

        <!-- 进度条系统 -->
        <div class="absolute top-18 left-4 right-4 pointer-events-none z-10 max-w-md">
            <div class="w-full bg-white/60 rounded-full h-2 p-0.5 border border-rose-200 shadow-inner overflow-hidden">
                <div id="progressBar" class="bg-gradient-to-r from-pink-400 via-rose-400 to-red-400 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-[9px] text-rose-400 mt-1 pl-1 pr-1 font-mono">
                <span>🐱 0只</span>
                <span>眨眼睛 (10只)</span>
                <span>爱心泡泡 (30只)</span>
                <span>喵呜告白 (52只)</span>
            </div>
        </div>

        <!-- 告白展示卡（喵咪满52只后淡入） -->
        <div id="confessionCard" class="absolute inset-x-4 top-1/2 -translate-y-1/2 max-w-lg mx-auto bg-white/95 backdrop-blur-lg border-2 border-rose-300 rounded-3xl p-6 shadow-2xl shadow-rose-200 text-center pointer-events-none opacity-0 scale-95 transition-all duration-1000 z-20 flex flex-col items-center justify-center space-y-4">
            <div class="w-14 h-14 rounded-full bg-rose-100 flex items-center justify-center text-rose-500 border border-rose-200 animate-bounce">
                <i data-lucide="cat" class="w-7 h-7"></i>
            </div>
            <div class="space-y-2">
                <h2 id="confessionTitle" class="text-xs font-bold tracking-widest text-pink-600 uppercase">💌 喵呜！甜甜的告白时刻 💌</h2>
                <p id="confessionText" class="text-base text-rose-800 font-medium leading-relaxed italic cursor-blink px-4"></p>
            </div>
            <div class="text-[10px] text-pink-500 font-mono">
                - 做一只有你宠爱的快乐喵 🐾 - Q.安静
            </div>
        </div>

        <!-- Canvas 画布 -->
        <canvas id="loveCanvas" class="w-full h-full block cursor-pointer"></canvas>
    </main>

    <script>
        // 初始化 Lucide 图标库
        lucide.createIcons();

        // Canvas 初始化
        const canvas = document.getElementById('loveCanvas');
        const ctx = canvas.getContext('2d');

        // 音效合成系统 (模拟萌萌的喵咪叫声和治愈八音盒)
        let audioEnabled = true;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 播放合成音效
        function playSound(type) {
            if (!audioEnabled) return;
            try {
                initAudio();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                const now = audioCtx.currentTime;

                if (type === 'tap') {
                    // 模拟猫咪可爱的短促喵叫 "啾/妙" (快速滑动的带共振三角波)
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    
                    // 音高快速从 800Hz 划到 1000Hz 模拟小猫嫩嫩的叫声
                    osc.frequency.setValueAtTime(850, now);
                    osc.frequency.exponentialRampToValueAtTime(1100, now + 0.12);
                    
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start();
                    osc.stop(now + 0.15);
                } else if (type === 'success') {
                    // 欢快双音 chime 声音
                    const osc1 = audioCtx.createOscillator();
                    const osc2 = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();

                    osc1.type = 'sine';
                    osc1.frequency.setValueAtTime(880, now); // A5
                    osc1.frequency.exponentialRampToValueAtTime(1320, now + 0.3);

                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(1046.5, now); // C6
                    osc2.frequency.exponentialRampToValueAtTime(1567.9, now + 0.3);

                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);

                    osc1.connect(gain);
                    osc2.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc1.start();
                    osc1.stop(now + 0.4);
                    osc2.start();
                    osc2.stop(now + 0.4);
                } else if (type === 'music') {
                    // 八音盒：经典喵呜纯音小曲子 (五音温暖回响)
                    const melody = [523.25, 659.25, 783.99, 880.00, 1046.50]; // C5 E5 G5 A5 C6
                    const duration = 0.22;
                    
                    melody.forEach((freq, idx) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + idx * duration);
                        
                        gain.gain.setValueAtTime(0.1, now + idx * duration);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + idx * duration + 0.5);
                        
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(now + idx * duration);
                        osc.stop(now + idx * duration + 0.6);
                    });
                }
            } catch (e) {
                console.warn('Web Audio API 播放受阻:', e);
            }
        }

        // 音频控制器绑定
        const toggleAudioBtn = document.getElementById('toggleAudio');
        const audioIcon = document.getElementById('audioIcon');
        const audioStatus = document.getElementById('audioStatus');

        toggleAudioBtn.addEventListener('click', () => {
            audioEnabled = !audioEnabled;
            if (audioEnabled) {
                audioStatus.textContent = "喵呜音效：开启";
                toggleAudioBtn.className = "flex items-center space-x-1 px-2.5 py-1.5 bg-rose-100 hover:bg-rose-200/60 border border-rose-200 text-rose-600 rounded-xl transition";
                audioIcon.setAttribute('data-lucide', 'volume-2');
                playSound('tap');
            } else {
                audioStatus.textContent = "音效已关";
                toggleAudioBtn.className = "flex items-center space-x-1 px-2.5 py-1.5 bg-rose-50/40 hover:bg-rose-100 border border-rose-200 text-rose-400 rounded-xl transition";
                audioIcon.setAttribute('data-lucide', 'volume-x');
            }
            lucide.createIcons();
        });

        // 告白文案
        const msg52Input = document.getElementById('msg52');
        const msg1314Input = document.getElementById('msg1314');

        // 自适应屏幕
        let scale = window.devicePixelRatio || 1;
        function resizeCanvas() {
            canvas.width = canvas.clientWidth * scale;
            canvas.height = canvas.clientHeight * scale;
            ctx.scale(scale, scale);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 核心运行状态
        let currentHeartsCount = 0;
        let isLongPressing = false;
        let longPressTimer = null;
        let confettiTriggered52 = false;
        let confettiTriggered1314 = false;

        // 收集阶段节点状态
        let catsBlinking = false;
        let showHeartBubbles = false;
        let finaleDancing = false;

        // 对象池与粒子
        const floatingCats = [];   // 下落/浮动的喵咪头
        const particles = [];      // 爆裂特效粒子 (樱花、星星、泡泡)
        const trailPaws = [];      // 滑动的粉红猫爪
        const sakuraFlowers = [];  // 背景缓慢飘落的樱花花瓣
        const bgToys = [];         // 小鱼干与毛线球

        // 创建背景飘落的樱花花瓣
        for (let i = 0; i < 35; i++) {
            sakuraFlowers.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 8 + 6,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.02,
                wind: Math.random() * 0.3 + 0.2,
                speed: Math.random() * 0.5 + 0.5
            });
        }

        // 创建背景小鱼干与毛线球
        for (let i = 0; i < 8; i++) {
            bgToys.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                type: Math.random() > 0.5 ? 'fish' : 'yarn',
                size: Math.random() * 15 + 15,
                opacity: Math.random() * 0.15 + 0.08,
                rotation: Math.random() * Math.PI,
                rotSpeed: (Math.random() - 0.5) * 0.005
            });
        }

        // ==================== 绘制图形辅助函数 ====================

        // 绘制超级治愈的喵喵脑袋 (带猫耳、眨眼表情、腮红和胡须)
        function drawCatHead(ctx, x, y, size, color, expression, rotation = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);

            // 1. 绘制猫脑袋椭圆
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.ellipse(0, 0, size, size * 0.82, 0, 0, Math.PI * 2);
            ctx.fill();

            // 2. 绘制左猫耳 (三角形)
            ctx.beginPath();
            ctx.moveTo(-size * 0.7, -size * 0.3);
            ctx.lineTo(-size * 0.85, -size * 1.05);
            ctx.lineTo(-size * 0.2, -size * 0.75);
            ctx.closePath();
            ctx.fill();
            // 内耳粉色
            ctx.fillStyle = '#FFC0CB';
            ctx.beginPath();
            ctx.moveTo(-size * 0.65, -size * 0.35);
            ctx.lineTo(-size * 0.78, -size * 0.9);
            ctx.lineTo(-size * 0.3, -size * 0.68);
            ctx.closePath();
            ctx.fill();

            // 3. 绘制右猫耳
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(size * 0.7, -size * 0.3);
            ctx.lineTo(size * 0.85, -size * 1.05);
            ctx.lineTo(size * 0.2, -size * 0.75);
            ctx.closePath();
            ctx.fill();
            // 内耳粉色
            ctx.fillStyle = '#FFC0CB';
            ctx.beginPath();
            ctx.moveTo(size * 0.65, -size * 0.35);
            ctx.lineTo(size * 0.78, -size * 0.9);
            ctx.lineTo(size * 0.3, -size * 0.68);
            ctx.closePath();
            ctx.fill();

            // 五官描边线颜色（温润的深红棕色）
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = Math.max(1.5, size * 0.08);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 4. 眼睛绘制
            ctx.fillStyle = '#8B4513';
            const eyeOffset = size * 0.38;
            const eyeY = -size * 0.1;
            const eyeR = size * 0.11;

            if (expression === 'heart') {
                // 爱心眼表情
                ctx.fillStyle = '#E11D48';
                drawHeartShape(ctx, -eyeOffset, eyeY - size * 0.05, size * 0.22);
                drawHeartShape(ctx, eyeOffset, eyeY - size * 0.05, size * 0.22);
            } else if (expression === 'blink' || (catsBlinking && Math.sin(Date.now() * 0.005 + x) > 0.85)) {
                // 眨眼表情 / 阶段触发自动眨眼
                ctx.beginPath();
                ctx.arc(-eyeOffset, eyeY, eyeR, 0, Math.PI, true);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(eyeOffset, eyeY, eyeR, 0, Math.PI, true);
                ctx.stroke();
            } else if (expression === 'wink') {
                // 单侧眨眼 (左开右闭)
                ctx.beginPath();
                ctx.arc(-eyeOffset, eyeY, eyeR, 0, Math.PI * 2);
                ctx.fill();
                // highlights
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(-eyeOffset - size*0.03, eyeY - size*0.03, size*0.035, 0, Math.PI*2);
                ctx.fill();

                ctx.strokeStyle = '#8B4513';
                ctx.beginPath();
                ctx.arc(eyeOffset, eyeY, eyeR, 0, Math.PI, true);
                ctx.stroke();
            } else {
                // 默认闪亮圆眼
                ctx.beginPath();
                ctx.arc(-eyeOffset, eyeY, eyeR, 0, Math.PI * 2);
                ctx.arc(eyeOffset, eyeY, eyeR, 0, Math.PI * 2);
                ctx.fill();
                // highlights 白点
                ctx.fillStyle = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(-eyeOffset - size*0.03, eyeY - size*0.03, size*0.035, 0, Math.PI*2);
                ctx.arc(eyeOffset - size*0.03, eyeY - size*0.03, size*0.035, 0, Math.PI*2);
                ctx.fill();
            }

            // 5. 粉嫩的小腮红
            ctx.fillStyle = 'rgba(255, 105, 180, 0.4)';
            ctx.beginPath();
            ctx.arc(-size * 0.5, size * 0.15, size * 0.15, 0, Math.PI * 2);
            ctx.arc(size * 0.5, size * 0.15, size * 0.15, 0, Math.PI * 2);
            ctx.fill();

            // 6. 鼻子与三字萌嘴
            ctx.strokeStyle = '#8B4513';
            ctx.beginPath();
            // 倒三角小粉鼻
            ctx.fillStyle = '#FF69B4';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(-size * 0.06, -size * 0.05);
            ctx.lineTo(size * 0.06, -size * 0.05);
            ctx.closePath();
            ctx.fill();

            // 萌萌三字嘴
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(-size * 0.08, size * 0.12, -size * 0.14, size * 0.05);
            ctx.moveTo(0, 0);
            ctx.quadraticCurveTo(size * 0.08, size * 0.12, size * 0.14, size * 0.05);
            ctx.stroke();

            // 7. 三根胡须
            ctx.beginPath();
            // 左胡须
            ctx.moveTo(-size * 0.65, size * 0.1);  ctx.lineTo(-size * 1.05, size * 0.06);
            ctx.moveTo(-size * 0.65, size * 0.2);  ctx.lineTo(-size * 1.1, size * 0.22);
            // 右胡须
            ctx.moveTo(size * 0.65, size * 0.1);   ctx.lineTo(size * 1.05, size * 0.06);
            ctx.moveTo(size * 0.65, size * 0.2);   ctx.lineTo(size * 1.1, size * 0.22);
            ctx.stroke();

            ctx.restore();
        }

        // 绘制粉红猫爪 (肉垫)
        function drawPawShape(ctx, x, y, size, alpha = 1.0) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#FFB6C1'; // 粉红色肉垫

            // 1. 掌心大肉垫
            ctx.beginPath();
            ctx.ellipse(x, y + size * 0.1, size * 0.72, size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();

            // 2. 四个脚趾瓣
            const toeRadius = size * 0.24;
            const toes = [
                { dx: -size * 0.52, dy: -size * 0.42 },
                { dx: -size * 0.18, dy: -size * 0.62 },
                { dx: size * 0.18, dy: -size * 0.62 },
                { dx: size * 0.52, dy: -size * 0.42 }
            ];

            toes.forEach(toe => {
                ctx.beginPath();
                ctx.arc(x + toe.dx, y + toe.dy, toeRadius, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.restore();
        }

        // 绘制简单爱心
        function drawHeartShape(ctx, x, y, size) {
            ctx.beginPath();
            ctx.moveTo(x, y - size / 4);
            ctx.bezierCurveTo(x + size / 2, y - size, x + size, y - size / 3, x, y + size * 0.9);
            ctx.bezierCurveTo(x - size, y - size / 3, x - size / 2, y - size, x, y - size / 4);
            ctx.closePath();
            ctx.fill();
        }

        // 绘制樱花瓣
        function drawSakuraPetal(ctx, x, y, size, rotation) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.fillStyle = 'rgba(255, 182, 193, 0.75)'; // 樱花半透明粉
            ctx.beginPath();
            // 绘制带有凹陷特征的花瓣
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-size * 0.8, -size * 0.5, -size * 0.5, -size * 1.5, 0, -size);
            ctx.bezierCurveTo(size * 0.5, -size * 1.5, size * 0.8, -size * 0.5, 0, 0);
            ctx.fill();
            ctx.restore();
        }

        // 绘制小鱼干 🐟
        function drawFish(ctx, x, y, size, opacity, rotation) {
            ctx.save();
            ctx.globalAlpha = opacity;
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.fillStyle = '#E2E8F0';
            ctx.strokeStyle = '#CBD5E1';
            ctx.lineWidth = 1.5;

            // 鱼身
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.8, size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // 三角形鱼尾
            ctx.beginPath();
            ctx.moveTo(-size * 0.7, 0);
            ctx.lineTo(-size * 1.1, -size * 0.3);
            ctx.lineTo(-size * 1.1, size * 0.3);
            ctx.closePath();
            ctx.fillStyle = '#CBD5E1';
            ctx.fill();
            ctx.stroke();

            // 鱼眼
            ctx.fillStyle = '#64748B';
            ctx.beginPath();
            ctx.arc(size * 0.4, -size * 0.1, size * 0.08, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // 绘制彩色毛线球 🧶
        function drawYarnBall(ctx, x, y, size, opacity, rotation) {
            ctx.save();
            ctx.globalAlpha = opacity;
            ctx.translate(x, y);
            ctx.rotate(rotation);
            ctx.strokeStyle = '#F472B6'; // 温暖浅粉
            ctx.lineWidth = 2;

            // 绘制乱线缠绕的毛线球效果
            ctx.beginPath();
            ctx.arc(0, 0, size * 0.7, 0, Math.PI * 2);
            ctx.stroke();

            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.ellipse(0, 0, size * 0.65, size * (0.2 + i * 0.1), i * 0.4, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 露出来的散线头
            ctx.beginPath();
            ctx.bezierCurveTo(size * 0.5, size * 0.5, size * 0.9, size * 1.1, size * 1.3, size * 0.8);
            ctx.stroke();

            ctx.restore();
        }

        // ==================== 浮动/下落喵咪类与拖尾定义 ====================

        class FloatingCat {
            constructor(x, y, isSpecial = false) {
                this.x = x;
                this.y = y;
                this.size = isSpecial ? Math.random() * 10 + 26 : Math.random() * 8 + 18;
                this.vx = (Math.random() - 0.5) * 1.8;
                this.vy = -(Math.random() * 1.5 + 1.2); // 向上缓缓漂浮
                this.alpha = 1;
                this.fadeSpeed = Math.random() * 0.007 + 0.005;

                // 喵喵色彩库
                const colors = [
                    '#FFB347', // 活力暖橘猫
                    '#FFE5B4', // 香槟奶茶猫
                    '#B8C5D6', // 高雅银蓝猫
                    '#FFFFFF', // 纯净奶油白
                    '#4A4A4A', // 优雅黑猫
                    '#FFCAD4'  // 软萌粉樱猫
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];

                // 表情库：眨眼、微笑、爱心眼、歪头
                const expressions = ['wink', 'default', 'default', 'blink'];
                this.expression = isSpecial ? 'heart' : expressions[Math.floor(Math.random() * expressions.length)];

                this.scale = 0.1;
                this.targetScale = 1.0;
                this.swingSpeed = Math.random() * 0.02 + 0.01;
                this.swingRange = Math.random() * 1.2 + 0.4;
                this.swingOffset = Math.random() * Math.PI * 2;
                this.rotation = (Math.random() - 0.5) * 0.2; // 歪歪头
            }

            update() {
                this.x += this.vx + Math.sin(this.swingOffset) * this.swingRange;
                this.y += this.vy;
                this.swingOffset += this.swingSpeed;

                if (this.scale < this.targetScale) {
                    this.scale += 0.08;
                }

                this.alpha -= this.fadeSpeed;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                // 利用 scale 缩放形成完美的出生弹性
                drawCatHead(ctx, this.x, this.y, this.size * this.scale, this.color, this.expression, this.rotation);
                ctx.restore();
            }
        }

        // 滑动猫爪拖尾类
        class TrailPaw {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 6 + 12;
                this.alpha = 0.9;
            }

            update() {
                this.alpha -= 0.025;
                this.size *= 0.97;
            }

            draw(ctx) {
                drawPawShape(ctx, this.x, this.y, this.size, this.alpha);
            }
        }

        // 星星、气泡及爱心爆发粒子类
        class SpecialParticle {
            constructor(x, y, type = 'star', color = '#FFE082') {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3.5 + 1.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = Math.random() * 4 + 2;
                this.alpha = 1;
                this.fadeSpeed = Math.random() * 0.02 + 0.012;
                this.color = color;
                this.type = type; // 'star' | 'bubble' | 'heart'
                this.gravity = 0.03;
            }

            update() {
                this.x += this.vx;
                this.vy += this.gravity;
                this.y += this.vy;
                this.alpha -= this.fadeSpeed;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 4;
                ctx.shadowColor = this.color;

                if (this.type === 'bubble') {
                    // 绘制梦幻彩色气泡
                    ctx.strokeStyle = this.color;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.stroke();
                    // 气泡内高光
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.beginPath();
                    ctx.arc(this.x - this.size * 0.3, this.y - this.size * 0.3, this.size * 0.25, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'heart') {
                    drawHeartShape(ctx, this.x, this.y, this.size);
                } else {
                    // 星星
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.7, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // 文字气泡类 ("喵～" 气泡)
        class MeowBubble {
            constructor(x, y) {
                this.x = x + (Math.random() - 0.5) * 30;
                this.y = y - 20;
                this.vy = -1.0;
                this.alpha = 1.0;
                const meows = ['喵呜~', '喵！', '喵喵', '贴贴 🐱', '咕噜噜~'];
                this.text = meows[Math.floor(Math.random() * meows.length)];
                this.scale = 0.8;
            }

            update() {
                this.y += this.vy;
                this.alpha -= 0.015;
                if (this.scale < 1.0) this.scale += 0.02;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);

                // 绘制可爱的云朵文字框
                ctx.fillStyle = '#FFFFFF';
                ctx.strokeStyle = '#FFB6C1';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(-30, -14, 60, 22, 10);
                ctx.fill();
                ctx.stroke();

                // 绘制小尾巴
                ctx.beginPath();
                ctx.moveTo(-5, 8);
                ctx.lineTo(0, 15);
                ctx.lineTo(5, 8);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // 文字
                ctx.fillStyle = '#D63384';
                ctx.font = 'bold 10px -apple-system';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, 0, -3);

                ctx.restore();
            }
        }

        // ==================== 中心巨型萌喵心跳实体 ====================

        const centerCat = {
            baseSize: 66,
            size: 66,
            scalePhase: 0,
            pulseSpeed: 0.03,
            clickAccelerate: 0,
            x: 0,
            y: 0,
            rotation: 0,

            update() {
                this.scalePhase += this.pulseSpeed + this.clickAccelerate;
                if (this.clickAccelerate > 0) {
                    this.clickAccelerate *= 0.94;
                }

                // 真实猫咪放松时的温和呼噜收缩律动
                const wave = Math.sin(this.scalePhase) * 0.10;
                const doubleBeat = Math.sin(this.scalePhase * 2.2) * 0.03;
                this.size = this.baseSize * (1 + wave + Math.max(0, doubleBeat));
                this.rotation = Math.sin(this.scalePhase * 0.5) * 0.05; // 身体跟随左右微微晃动
            },

            draw(ctx, width, height) {
                this.x = width / 2;
                this.y = height / 2 + 15;

                ctx.save();
                // 1. 绘制温润的发光底层氛围圈
                ctx.globalAlpha = 0.18 + Math.sin(this.scalePhase) * 0.06;
                ctx.fillStyle = '#FFB6C1';
                ctx.shadowBlur = 32 + Math.sin(this.scalePhase) * 12;
                ctx.shadowColor = '#FF69B4';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 1.25, 0, Math.PI * 2);
                ctx.fill();

                // 2. 绘制超萌主猫咪头
                ctx.globalAlpha = 1.0;
                // 使用橘色猫系配色
                drawCatHead(ctx, this.x, this.y, this.size, '#FFB347', finaleDancing ? 'heart' : 'wink', this.rotation);
                ctx.restore();
            }
        };

        // 终极舞动喵咪数据
        const danceCatsList = [];
        function initDancingCats(w, h) {
            danceCatsList.length = 0;
            const colors = ['#FFE5B4', '#B8C5D6', '#FFFFFF', '#FFCAD4', '#4A4A4A'];
            for (let i = 0; i < 6; i++) {
                danceCatsList.push({
                    angle: (Math.PI * 2 / 6) * i,
                    radius: 120,
                    size: 18,
                    color: colors[i % colors.length],
                    rot: 0,
                    exp: 'wink'
                });
            }
        }

        // ==================== 业务交互与计数触发逻辑 ====================

        const currentHeartsText = document.getElementById('currentHearts');
        const targetHeartsText = document.getElementById('targetHearts');
        const progressBar = document.getElementById('progressBar');
        const hintBubble = document.getElementById('hintBubble');

        function addHeartCount(count = 1) {
            currentHeartsCount += count;
            currentHeartsText.textContent = currentHeartsCount;

            // 升级里程碑逻辑
            if (currentHeartsCount >= 10) {
                catsBlinking = true;
            }
            if (currentHeartsCount >= 30) {
                showHeartBubbles = true;
            }

            let progress = 0;

                progress = (currentHeartsCount / 52) * 50;

                hintBubble.textContent = "喵喵能量欢快聚集中 🐾";
            } else if (currentHeartsCount < 1314) {
                const subProgress = ((currentHeartsCount - 52) / (1314 - 52)) * 50;
                progress = 50 + subProgress;
                targetHeartsText.textContent = "1314";
                hintBubble.textContent = "喵呜！达成首段。继续集齐1314吧~ 💖";
            } else {
                progress = 100;
                targetHeartsText.textContent = "1314";
                hintBubble.textContent = "终极喵喵王国奇迹诞生 ✨";
            }

            progressBar.style.width = `${Math.min(100, progress)}%`;
            checkMilestones();
        }

        // 告白弹卡与打字机效果
        let typeTimer = null;
        function typeWriter(text, element, speed = 80) {
            element.innerHTML = "";
            let i = 0;
            clearInterval(typeTimer);
            element.classList.add('cursor-blink');
            
            typeTimer = setInterval(() => {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typeTimer);
                    setTimeout(() => {
                        element.classList.remove('cursor-blink');
                    }, 1000);
                }
            }, speed);
        }

        const confessionCard = document.getElementById('confessionCard');
        const confessionTitle = document.getElementById('confessionTitle');
        const confessionText = document.getElementById('confessionText');

        const activeMeowBubbles = []; // 存储飘出的文字泡泡

        function checkMilestones() {
            // 52 喵： 喵呜告白高潮
            if (currentHeartsCount >= 52 && !confettiTriggered52) {
                confettiTriggered52 = true;
                finaleDancing = true; // 开启小猫跳舞
                initDancingCats(canvas.clientWidth, canvas.clientHeight);

                // 第3秒爆发全屏猫爪与星星烟花
                for (let i = 0; i < 90; i++) {

                    particles.push(new SpecialParticle(canvas.clientWidth / 2, canvas.clientHeight / 2 - 50, 'bubble', '#FFB6C1'));
                    particles.push(new SpecialParticle(canvas.clientWidth / 2, canvas.clientHeight / 2 - 50, 'heart', '#D63384'));
                }

                // 展现告白卡
                confessionCard.style.opacity = '1';
                confessionCard.style.transform = 'translate(-50%, -50%) scale(1)';
                confessionCard.style.left = '50%';
                confessionCard.style.top = '50%';
                confessionTitle.textContent = "🐱 喵呜告白时刻 🐱";
                
                const customMsg52 = msg52Input.value.trim() || "喵喵~ 我喜欢你呀，遇见你就是心动的开始 💓🐾";
                typeWriter(customMsg52, confessionText, 100);
            }

            // 1314 喵：一生一世终极喵呜彩蛋
            if (currentHeartsCount >= 1314 && !confettiTriggered1314) {
                confettiTriggered1314 = true;
                playSound('success');
                playSound('music');
                setTimeout(() => playSound('music'), 1400);

                // 全屏绚烂花瓣喵喵海
                for (let k = 0; k < 6; k++) {
                    setTimeout(() => {
                        const rx = Math.random() * canvas.clientWidth;
                        const ry = Math.random() * (canvas.clientHeight * 0.6);
                        const colors = ['#FFD1DC', '#FFE4E6', '#FFF0F2', '#E11D48', '#FFB347'];
                        const selColor = colors[Math.floor(Math.random() * colors.length)];
                        for (let i = 0; i < 50; i++) {
                            particles.push(new SpecialParticle(rx, ry, 'heart', selColor));
                            particles.push(new SpecialParticle(rx, ry, 'bubble', '#FFFFFF'));
                        }
                    }, k * 350);
                }

                confessionCard.style.opacity = '1';
                confessionCard.style.transform = 'translate(-50%, -50%) scale(1)';
                confessionTitle.textContent = "👑 终极一生一世喵契 👑";
                const customMsg1314 = msg1314Input.value.trim() || "我喜欢你，不是一时兴起。而是做好了永远赖在你身边的温柔约定 ✨";
                typeWriter(customMsg1314, confessionText, 90);

        }

        // 重置喵呜收集器
        const resetProgressBtn = document.getElementById('resetProgress');
        resetProgressBtn.addEventListener('click', () => {
            currentHeartsCount = 0;
            confettiTriggered52 = false;
            confettiTriggered1314 = false;
            catsBlinking = false;
            showHeartBubbles = false;
            finaleDancing = false;
            currentHeartsText.textContent = "0";
            targetHeartsText.textContent = "52";
            progressBar.style.width = "0%";
            hintBubble.textContent = "点击屏幕，唤醒可爱猫咪 ✨";
            
            // 隐藏告白卡
            confessionCard.style.opacity = '0';
            confessionCard.style.transform = 'translate(-50%, -45%) scale(0.9)';
            clearInterval(typeTimer);
            confessionText.innerHTML = "";

            playSound('tap');
        });

        // ==================== 屏幕事件捕获 (手势转换) ====================

        function triggerInteract(x, y, count = 1, isSpecial = false) {
            playSound('tap');
            addHeartCount(count);

            centerCat.clickAccelerate = 0.08;

            // 产生浮动小猫咪头
            for (let i = 0; i < count; i++) {
                floatingCats.push(new FloatingCat(x, y, isSpecial));
            }

            // 单击或双击时落下一只粉色肉垫
            trailPaws.push(new TrailPaw(x, y));

            // 如果是双击，不仅生成3只小猫咪，还要产生萌系文字泡泡
            if (isSpecial) {
                activeMeowBubbles.push(new MeowBubble(x, y));
            }

            // 产生爱心泡泡与星星小粒子
            const colors = ['#FFC0CB', '#FFB347', '#FF69B4', '#FFF0F2'];
            const bubbleColor = colors[Math.floor(Math.random() * colors.length)];
            const particleType = showHeartBubbles ? (Math.random() > 0.5 ? 'heart' : 'bubble') : 'star';
            
            for (let i = 0; i < (isSpecial ? 15 : 6); i++) {
                particles.push(new SpecialParticle(x, y, particleType, bubbleColor));
            }
        }

        let lastTapTime = 0;
        function handleInteractionStart(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const posX = clientX - rect.left;
            const posY = clientY - rect.top;

            const now = Date.now();
            if (now - lastTapTime < 280) {
                // 双击： 3只猫咪 + 喵呜文字气泡
                triggerInteract(posX, posY, 3, true);
            } else {
                // 单击：1只猫咪 + 1个猫爪印
                triggerInteract(posX, posY, 1, false);
            }
            lastTapTime = now;

            // 长按准备
            isLongPressing = true;
            clearTimeout(longPressTimer);
            longPressTimer = setTimeout(() => {
                startMeowRain(posX, posY);
            }, 450);
        }

        // 长按产生连绵不断的喵呜雨
        function startMeowRain(x, y) {
            if (!isLongPressing) return;
            
            const rainInterval = setInterval(() => {
                if (!isLongPressing) {
                    clearInterval(rainInterval);
                    return;
                }
                const offset = 50;
                const rx = x + (Math.random() - 0.5) * offset;
                const ry = y + (Math.random() - 0.5) * offset;
                triggerInteract(rx, ry, 1, false);
            }, 90);
        }

        // 鼠标事件监听
        canvas.addEventListener('mousedown', (e) => {
            handleInteractionStart(e.clientX, e.clientY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isLongPressing) {
                const rect = canvas.getBoundingClientRect();
                const posX = e.clientX - rect.left;
                const posY = e.clientY - rect.top;
                trailPaws.push(new TrailPaw(posX, posY));
            }
        });

        window.addEventListener('mouseup', () => {
            isLongPressing = false;
            clearTimeout(longPressTimer);
        });

        // 触摸屏事件高精度适配
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleInteractionStart(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const posX = touch.clientX - rect.left;
            const posY = touch.clientY - rect.top;
            
            trailPaws.push(new TrailPaw(posX, posY));
        });

        canvas.addEventListener('touchend', () => {
            isLongPressing = false;
            clearTimeout(longPressTimer);
        });

        // ==================== 统一帧率动效渲染环 ====================

        function renderScene() {
            // 1. 渲染樱花渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.clientHeight);
            gradient.addColorStop(0, '#FFE4E6'); // 软香樱花粉
            gradient.addColorStop(1, '#FFF2F4');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.clientWidth, canvas.clientHeight);

            // 2. 渲染背景中偶尔漂浮的小鱼干🐟和毛线球🧶 (视差感)
            bgToys.forEach(toy => {
                toy.rotation += toy.rotSpeed;
                if (toy.type === 'fish') {
                    drawFish(ctx, toy.x, toy.y, toy.size, toy.opacity, toy.rotation);
                } else {
                    drawYarnBall(ctx, toy.x, toy.y, toy.size, toy.opacity, toy.rotation);
                }
            });

            // 3. 渲染飘零落下的浪漫樱花花瓣 🌸
            sakuraFlowers.forEach(petal => {
                petal.y += petal.speed;
                petal.x += petal.wind;
                petal.rotation += petal.rotSpeed;

                if (petal.y > canvas.clientHeight + 10) {
                    petal.y = -10;
                    petal.x = Math.random() * canvas.clientWidth;
                }
                drawSakuraPetal(ctx, petal.x, petal.y, petal.size, petal.rotation);
            });

            // 4. 渲染中心萌猫实体
            centerCat.update();
            centerCat.draw(ctx, canvas.clientWidth, canvas.clientHeight);

            // 5. 如果是【喵呜告白】达成：围绕文字转圈圈跳舞的小猫
            if (finaleDancing) {
                const cx = canvas.clientWidth / 2;
                const cy = canvas.clientHeight / 2 + 15;
                
                danceCatsList.forEach(cat => {
                    cat.angle += 0.012; // 缓慢转圈
                    cat.rot = Math.sin(Date.now() * 0.005 + cat.angle) * 0.15; // 身体左右摇晃
                    
                    const dx = cx + Math.cos(cat.angle) * cat.radius;
                    const dy = cy + Math.sin(cat.angle) * cat.radius;
                    
                    drawCatHead(ctx, dx, dy, cat.size, cat.color, cat.exp, cat.rot);
                });
            }

            // 6. 渲染粉色肉垫拖尾
            for (let i = trailPaws.length - 1; i >= 0; i--) {
                const trail = trailPaws[i];
                trail.update();
                if (trail.alpha <= 0) {
                    trailPaws.splice(i, 1);
                } else {
                    trail.draw(ctx);
                }
            }

            // 7. 渲染爆出的特效粒子 (星星、泡泡、爱心)
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    p.draw(ctx);
                }
            }

            // 8. 渲染上升浮动的萌猫咪
            for (let i = floatingCats.length - 1; i >= 0; i--) {
                const cat = floatingCats[i];
                cat.update();
                if (cat.alpha <= 0 || cat.y < -40) {
                    floatingCats.splice(i, 1);
                } else {
                    cat.draw(ctx);
                }
            }

            // 9. 渲染萌系文字泡泡
            for (let i = activeMeowBubbles.length - 1; i >= 0; i--) {
                const b = activeMeowBubbles[i];
                b.update();
                if (b.alpha <= 0) {
                    activeMeowBubbles.splice(i, 1);
                } else {
                    b.draw(ctx);
                }
            }

            requestAnimationFrame(renderScene);
        }

        // 浪漫喵喵世界开始启动！
        renderScene();

    </script>
</body>
</html>
